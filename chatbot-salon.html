<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎉 Asistente Salón</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:      #25d366;
      --green-dark: #128c7e;
      --bg:         #e5ddd5;
      --user-bg:    #dcf8c6;
      --bot-bg:     #ffffff;
      --header-bg:  #075e54;
      --radius:     18px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────── */
    #header {
      background: var(--header-bg);
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,.25);
      flex-shrink: 0;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--green); display: flex; align-items: center;
      justify-content: center; font-size: 1.3rem; flex-shrink: 0;
    }
    .hinfo { flex: 1; }
    .hname { font-size: .97rem; font-weight: 600; }
    .hsub  { font-size: .68rem; opacity: .75; }
    .reset-btn {
      background: none; border: none; color: #fff;
      opacity: .75; cursor: pointer; font-size: .78rem;
      padding: 5px 9px; border-radius: 6px; transition: opacity .15s;
    }
    .reset-btn:hover { opacity: 1; background: rgba(255,255,255,.15); }

    /* ── Messages ─────────────────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto; padding: 10px 8px 6px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .msg-wrap { display: flex; flex-direction: column; margin-bottom: 2px; }
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.bot  { align-items: flex-start; }

    .bubble {
      max-width: min(78vw, 360px);
      padding: 8px 11px;
      border-radius: var(--radius);
      font-size: .875rem; line-height: 1.45;
      word-break: break-word; white-space: pre-wrap;
      box-shadow: 0 1px 2px rgba(0,0,0,.13);
    }
    .user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
    .bot  .bubble { background: var(--bot-bg);  border-bottom-left-radius: 4px; }

    .msg-time {
      font-size: .62rem; color: #888;
      padding: 2px 5px 0;
    }

    /* ── Quick replies ────────────────────────────────────── */
    .qr-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 4px 2px 6px 2px;
      max-width: min(90vw, 420px);
    }
    .qr-btn {
      background: #fff; border: 1.5px solid var(--green);
      color: var(--green-dark); border-radius: 20px;
      padding: 5px 13px; font-size: .82rem; font-weight: 500;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .qr-btn:hover, .qr-btn:active { background: var(--green); color: #fff; }

    /* ── Typing indicator ─────────────────────────────────── */
    .typing-row { display: flex; align-items: flex-start; padding: 2px 0; }
    .typing-bubble {
      background: var(--bot-bg); border-radius: var(--radius); border-bottom-left-radius: 4px;
      padding: 10px 14px; display: flex; gap: 4px; align-items: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.12);
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #aaa;
      animation: bounce .85s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .17s; }
    .dot:nth-child(3) { animation-delay: .34s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }

    /* ── WhatsApp card ────────────────────────────────────── */
    .wapp-card {
      background: #f0fdf4; border: 1.5px solid #86efac;
      border-radius: 10px; padding: 10px;
      font-size: .78rem; font-family: 'Courier New', monospace;
      white-space: pre-wrap; word-break: break-word;
      max-height: 280px; overflow-y: auto; margin-top: 6px;
    }
    .copy-btn {
      display: block; width: 100%; margin-top: 7px;
      padding: 8px; background: var(--green); color: #fff;
      border: none; border-radius: 8px; font-size: .85rem;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .copy-btn:hover { background: var(--green-dark); }
    .saved-pill {
      display: inline-block; margin-top: 5px;
      background: #dcfce7; color: #15803d;
      border-radius: 20px; padding: 2px 10px; font-size: .73rem;
    }

    /* ── Input bar ────────────────────────────────────────── */
    #input-bar {
      background: #f0f0f0; padding: 7px 10px;
      display: flex; gap: 7px; align-items: center;
      border-top: 1px solid #d0d0d0; flex-shrink: 0;
    }
    #userInput {
      flex: 1; border: none; border-radius: 22px;
      padding: 9px 15px; font-size: .9rem; outline: none;
      background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.1);
      resize: none; height: 42px; line-height: 1.4;
    }
    .icon-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 1.05rem;
      transition: all .15s; flex-shrink: 0;
    }
    #micBtn { background: #e0e0e0; color: #555; }
    #micBtn.listening {
      background: #fee2e2; color: #dc2626;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }
    #sendBtn { background: var(--green); color: #fff; }
    #sendBtn:hover { background: var(--green-dark); }
  </style>
</head>
<body>

<div id="header">
  <div class="avatar">🎉</div>
  <div class="hinfo">
    <div class="hname">Asistente Salón</div>
    <div class="hsub">Presupuestos al instante</div>
  </div>
  <button class="reset-btn" onclick="resetChat()">↺ Nuevo</button>
</div>

<div id="messages"></div>

<div id="input-bar">
  <input type="text" id="userInput"
    placeholder="Ej: 20 niños y 30 adultos para el sábado…"
    autocomplete="off"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
  <button class="icon-btn" id="micBtn" onclick="toggleVoice()" title="Hablar">🎤</button>
  <button class="icon-btn" id="sendBtn"  onclick="sendMessage()"  title="Enviar">➤</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG — comparte localStorage con presupuesto-salon.html
// ═══════════════════════════════════════════════════════════════
const DEFAULTS = {
  baseWeekday: 20000, baseWeekend: 22000, extraHour: 5000,
  kidsIncluded: 20,   kidsBasic: 200,     kidsAlt: 300,
  adultsIncluded: 10, menuPizza: 300,     menuPizzaCalzone: 350, menuFull: 400,
  recIncluded: 2,     kidsPerRec: 10,     adultsPerWaiter: 20,
  staffCost: 2000,    staffExtraHr: 250,
  webhookUrl: 'https://script.google.com/macros/s/AKfycbxwn2hPDk6ZiBN5qrJ7rNjHIWi3UkmZkcvJDLtbQwjAWyIpbPLuoqWGrnu2xz0_wDjQhQ/exec'
};
const cfg = () => {
  try {
    const s = localStorage.getItem('salonCfg');
    if (!s) return { ...DEFAULTS };
    const stored = JSON.parse(s);
    // Si el webhookUrl guardado está vacío, usar el de DEFAULTS
    if (!stored.webhookUrl) delete stored.webhookUrl;
    return { ...DEFAULTS, ...stored };
  } catch { return { ...DEFAULTS }; }
};
const fmtCur = n => '$\u202f' + Math.round(n).toLocaleString('es-UY');

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let state = {};
function resetState() {
  state = {
    kids: null, adults: null, date: null,
    kidsMenu: null, adultsMenu: null,
    extraHours: 0, extraStaff: 0, comments: '',
    clientName: null,
    extrasAsked: false,
    _waitingFor: null,
    step: 'start',   // start | confirm | editing | done
                     // reserva: reserva_select | reserva_collecting | reserva_confirm | reserva_editing
    total: null, _calc: null,
    // Reserva
    eventName: null, startTime: null,
    _selectedPresId: null, _presCache: []
  };
}

// ═══════════════════════════════════════════════════════════════
//  DATE HELPERS
// ═══════════════════════════════════════════════════════════════
const MONTHS_ES = {
  enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,
  julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12
};
// keys sin acento (el texto se normaliza antes de buscar)
const WEEKDAYS_ES = {
  domingo:0,lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6
};

function norm(s) {
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function nextOccurrence(weekday) {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = (weekday - today.getDay() + 7) % 7 || 7;
  const d = new Date(today); d.setDate(today.getDate() + diff);
  return d;
}

function parseDateFromText(raw) {
  const t = norm(raw);

  // hoy / mañana
  if (/\bhoy\b/.test(t)) { const d = new Date(); d.setHours(0,0,0,0); return d; }
  if (/\bmanana\b/.test(t)) { const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+1); return d; }

  // "el sábado", "próximo viernes", "sábado que viene"
  for (const [name, num] of Object.entries(WEEKDAYS_ES)) {
    if (new RegExp('\\b' + name + '\\b').test(t)) return nextOccurrence(num);
  }

  // DD/MM o DD/MM/YYYY
  const slashM = t.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
  if (slashM) {
    const day = +slashM[1], mon = +slashM[2] - 1;
    const yr  = slashM[3]
      ? (slashM[3].length === 2 ? 2000 + +slashM[3] : +slashM[3])
      : new Date().getFullYear();
    const d = new Date(yr, mon, day);
    if (!isNaN(d)) return d;
  }

  // "el 20 de marzo" / "20 de marzo" / "20 marzo" / "20 marzo 2026"
  const monthPat = Object.keys(MONTHS_ES).join('|');
  const textM = t.match(
    new RegExp('\\b(\\d{1,2})\\s+(?:de\\s+)?(' + monthPat + ')(?:\\s+(?:de\\s+)?(\\d{4}))?')
  );
  if (textM) {
    const day = +textM[1], mon = MONTHS_ES[textM[2]] - 1;
    let yr = textM[3] ? +textM[3] : new Date().getFullYear();
    let d = new Date(yr, mon, day); d.setHours(0,0,0,0);
    if (d < new Date() && !textM[3]) d = new Date(yr + 1, mon, day);
    if (!isNaN(d)) return d;
  }

  return null;
}

const DAY_NAMES  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MON_NAMES  = ['enero','febrero','marzo','abril','mayo','junio',
                    'julio','agosto','septiembre','octubre','noviembre','diciembre'];

function fmtDate(d)    { return `${DAY_NAMES[d.getDay()]} ${d.getDate()} de ${MON_NAMES[d.getMonth()]}`; }
function isWeekend(d)  { const w = d.getDay(); return w === 0 || w === 5 || w === 6; }
function dateISO(d)    { return d.toISOString().split('T')[0]; }

// ═══════════════════════════════════════════════════════════════
//  EXTRACTOR  – saca datos de texto libre
// ═══════════════════════════════════════════════════════════════
function extractNumber(t, keywords) {
  for (const kw of keywords) {
    // "20 niños" o "niños: 20" o "niños(20)"
    const m1 = t.match(new RegExp('(\\d+)\\s*' + kw + 's?\\b'));
    if (m1) return +m1[1];
    const m2 = t.match(new RegExp(kw + 's?\\b.{0,25}?(\\d+)'));
    if (m2) return +m2[1];
  }
  return null;
}

function extractFromText(raw) {
  const t = norm(raw);

  // Niños
  const k = extractNumber(t, ['nino','nene','chico','menor','pibito','bebe','infante','kid','pequeno','gurí','guri']);
  if (k !== null) state.kids = k;

  // Adultos
  const a = extractNumber(t, ['adulto','grande','persona','mayor','invitado','pax']);
  if (a !== null) state.adults = a;

  // Horas extra ("6 horas" → 2 extra; "2 horas extra" → 2 extra)
  const exM = t.match(/(\d+)\s*hora\s*extra/);
  if (exM) { state.extraHours = +exM[1]; }
  else {
    const totalHrM = t.match(/(\d+)\s*hora/);
    if (totalHrM && +totalHrM[1] > 4) state.extraHours = +totalHrM[1] - 4;
  }

  // Personal extra ("2 personal extra", "1 persona adicional")
  const staffExM = t.match(/(\d+)\s*(?:personal|personas?)\s*(?:extra|adicional)/);
  if (staffExM) state.extraStaff = +staffExM[1];

  // Fecha
  const d = parseDateFromText(raw);
  if (d) state.date = d;

  // Menú niños
  if (/alternativ|menu alt|alt\b/.test(t))         state.kidsMenu = 'alt';
  else if (/basic|comida\s+nino|menu\s+nino/.test(t)) state.kidsMenu = 'basic';

  // Menú adultos
  if (/chivito|completo|full\b|todo/.test(t))       state.adultsMenu = 'pizza_calzone_chivito';
  else if (/calzon/.test(t))                         state.adultsMenu = 'pizza_calzone';
  else if (/pizza|piza/.test(t))                     state.adultsMenu = 'pizza';
  else if (/traen|sin men|no comen|propio/.test(t))  state.adultsMenu = 'none';

  // Nombre del cliente
  const nameM = raw.match(
    /(?:para\s+(?:los?\s+|la\s+|las\s+)?|a\s+nombre\s+de\s+|apellido\s*[:=]?\s*|familia\s+)([A-ZÁÉÍÓÚÑ][a-záéíóúñ]{2,}(?:\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]{2,})?)/
  );
  if (nameM && !state.clientName) state.clientName = nameM[1];
}

// ═══════════════════════════════════════════════════════════════
//  CÁLCULO  (misma lógica que presupuesto-salon.html)
// ═══════════════════════════════════════════════════════════════
function calculate() {
  const C = cfg();
  const km = state.kidsMenu  || 'basic';
  const am = state.adultsMenu || 'none';

  const basePrice = isWeekend(state.date) ? C.baseWeekend : C.baseWeekday;

  // Staff (igual lógica que presupuesto-salon.html)
  const recsNeeded    = state.kids   > 0 ? Math.ceil(state.kids   / C.kidsPerRec)      : 0;
  const waiters       = state.adults > 0 ? Math.ceil(state.adults / C.adultsPerWaiter) : 0;
  const actualRecs    = state.kids   > 0 ? Math.max(recsNeeded, C.recIncluded)         : 0;
  const totalStaff    = actualRecs + waiters + state.extraStaff;

  const salonExtraCst = state.extraHours * C.extraHour;
  const extraHrTotCst = salonExtraCst + totalStaff * state.extraHours * C.staffExtraHr;

  const kidsIncl     = Math.min(state.kids, C.kidsIncluded);
  const kidsExtra    = Math.max(0, state.kids - C.kidsIncluded);
  const kidsMenuPrc  = km === 'basic' ? C.kidsBasic : C.kidsAlt;
  const kidsExtraCst = kidsExtra * kidsMenuPrc;
  const kidsUpgrade  = km === 'alt' ? kidsIncl * (C.kidsAlt - C.kidsBasic) : 0;

  const adultPrices  = { none:0, pizza:C.menuPizza, pizza_calzone:C.menuPizzaCalzone, pizza_calzone_chivito:C.menuFull };
  const adultMenuPrc = adultPrices[am] || 0;
  const adultMenuCst = state.adults * adultMenuPrc;

  const recsExtra  = Math.max(0, recsNeeded - C.recIncluded);
  const recsCst    = recsExtra * C.staffCost;
  const waitersCst = waiters   * C.staffCost;
  const xStaffCst  = state.extraStaff * C.staffCost;

  const total = basePrice + extraHrTotCst + kidsExtraCst + kidsUpgrade + adultMenuCst + recsCst + waitersCst + xStaffCst;
  state.total = Math.round(total / 100) * 100;
  state._calc = {
    C, basePrice, km, am, kidsMenuPrc, adultMenuPrc,
    kidsExtraCst, kidsUpgrade, adultMenuCst,
    recsCst, waitersCst, xStaffCst, extraHrTotCst, salonExtraCst,
    kidsIncl, kidsExtra, recsNeeded, recsExtra, waiters
  };
  return state.total;
}

// ═══════════════════════════════════════════════════════════════
//  RESUMEN SENCILLO (para confirmar antes de guardar)
// ═══════════════════════════════════════════════════════════════
function buildSummary() {
  const menuK    = KIDS_MENU_NAMES[state.kidsMenu   || 'basic'];
  const menuA    = ADULT_MENU_NAMES[state.adultsMenu || 'none'];
  const totalHrs = 4 + state.extraHours;
  const dayLabel = isWeekend(state.date) ? 'fin de semana 🎉' : 'día de semana';

  let t = `📋 *Resumen del presupuesto*\n\n`;
  if (state.clientName) t += `👤 ${state.clientName}\n`;
  t += `📅 ${fmtDate(state.date)} — ${dayLabel}\n`;
  t += `👶 ${state.kids} niños — ${menuK}\n`;
  t += `🧑 ${state.adults} adultos — ${menuA}\n`;
  t += `⏱ ${totalHrs} hs${state.extraHours > 0 ? ` (4 incluidas + ${state.extraHours} extra)` : ' (incluidas)'}\n`;
  if (state.extraStaff > 0) t += `👤 ${state.extraStaff} personal adicional\n`;
  if (state.comments)        t += `💬 ${state.comments}\n`;
  t += `\n💰 *Total: ${fmtCur(state.total)}*`;
  return t;
}

// ═══════════════════════════════════════════════════════════════
//  WHATSAPP TEXT
// ═══════════════════════════════════════════════════════════════
const KIDS_MENU_NAMES  = { basic:'Menú básico', alt:'Menú alternativo' };
const ADULT_MENU_NAMES = { none:'Traen su comida', pizza:'Solo pizzas',
                           pizza_calzone:'Pizzas y calzones',
                           pizza_calzone_chivito:'Pizzas, calzones y chivitos' };

function buildWhatsApp() {
  const b = state._calc;
  const totalHrs = 4 + state.extraHours;
  const dayLabel = isWeekend(state.date) ? 'Fin de semana' : 'Lunes–Jueves';
  const menuK = KIDS_MENU_NAMES[state.kidsMenu   || 'basic'];
  const menuA = ADULT_MENU_NAMES[state.adultsMenu || 'pizza'];

  let t = `🎉 *PRESUPUESTO SALÓN DE FIESTAS*\n`;
  t    += `━━━━━━━━━━━━━━━━━━━━━\n`;
  if (state.clientName) t += `👤 *Cliente:* ${state.clientName}\n`;
  t    += `📅 *Fecha:* ${fmtDate(state.date)}\n`;
  t    += `👶 *Niños:* ${state.kids}  |  🧑 *Adultos:* ${state.adults}\n`;
  t    += `⏱ *Duración:* ${totalHrs} hs\n\n`;

  t    += `📋 *DETALLE:*\n`;
  t    += `🏠 Alquiler base (${dayLabel}): ${fmtCur(b.basePrice)}\n`;
  if (b.kidsExtraCst > 0)  t += `👶 Niños extra (${b.kidsExtra} × ${fmtCur(b.kidsMenuPrc)}): ${fmtCur(b.kidsExtraCst)}\n`;
  if (b.kidsUpgrade  > 0)  t += `🍽️ Upgrade menú niños: ${fmtCur(b.kidsUpgrade)}\n`;
  if (b.adultMenuCst > 0)  t += `🍕 Menú adultos (${state.adults} × ${fmtCur(b.adultMenuPrc)}): ${fmtCur(b.adultMenuCst)}\n`;
  if (b.recsCst      > 0)  t += `🎪 Recreadores extra (${b.recsExtra}): ${fmtCur(b.recsCst)}\n`;
  if (b.waitersCst   > 0)  t += `🧑‍🍳 Mozos (${b.waiters}): ${fmtCur(b.waitersCst)}\n`;
  if (b.xStaffCst    > 0)  t += `👤 Personal adicional (${state.extraStaff}): ${fmtCur(b.xStaffCst)}\n`;
  if (b.extraHrTotCst> 0)  t += `⏱ Horas extra: ${fmtCur(b.extraHrTotCst)}\n`;
  t    += `\n✅ *TOTAL: ${fmtCur(state.total)}*\n`;
  t    += `━━━━━━━━━━━━━━━━━━━━━\n`;
  t    += `_Menú niños: ${menuK}_\n`;
  t    += `_Menú adultos: ${menuA}_\n`;
  if (state.comments) t += `_💬 ${state.comments}_\n`;
  t    += `🎡 Toro mecánico o agujas + castillo inflable ¡sin costo! 🆓\n`;
  t    += `━━━━━━━━━━━━━━━━━━━━━\n`;
  t    += `_Precios en pesos uruguayos ($UY)_`;
  return t;
}

// ═══════════════════════════════════════════════════════════════
//  GUARDAR EN SHEET
// ═══════════════════════════════════════════════════════════════
function saveToSheet() {
  const url = cfg().webhookUrl;
  if (!url || !url.startsWith('http')) return false;

  const id      = 'bot-' + Date.now();
  const dateStr = dateISO(state.date);
  const dayType = isWeekend(state.date) ? 'weekend' : 'weekday';
  const totalHrs = 4 + state.extraHours;

  const payload = {
    'ID':              id,
    'Tipo':            'presupuesto',
    'Nombre guardado': state.clientName || '',
    'Fecha':           `${String(state.date.getDate()).padStart(2,'0')}/${String(state.date.getMonth()+1).padStart(2,'0')}/${state.date.getFullYear()}`,
    'Nombre evento':   state.clientName || '',
    'Hora inicio':     '',
    'Hora fin':        '',
    'Duración (hs)':   totalHrs,
    'Tipo de día':     dayType === 'weekday' ? 'Lunes–Jueves' : 'Vie/Sáb/Dom/Fer',
    'Nº niños':        state.kids,
    'Menú niños':      state.kidsMenu === 'alt' ? 'Alternativo' : 'Básico',
    'Nº adultos':      state.adults,
    'Menú adultos':    ADULT_MENU_NAMES[state.adultsMenu || 'pizza'],
    'Horas extra':     state.extraHours,
    'Personal extra':  state.extraStaff,
    'Total ($)':       state.total,
    'Descuento valor': '',
    'Descuento tipo':  '',
    'Descripción':     state.comments || '',
    'Notas':           'Creado desde chatbot',
    'Guardado el':     new Date().toISOString()
  };

  fetch(url, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain' },
    body:    JSON.stringify(payload)
  }).catch(() => {});

  return true;
}

// ═══════════════════════════════════════════════════════════════
//  GUARDAR RESERVA (sheet + localStorage)
// ═══════════════════════════════════════════════════════════════
function calcEndTime(startTime, totalHrs) {
  const [h, m] = startTime.split(':').map(Number);
  const mins   = h * 60 + m + totalHrs * 60;
  return `${String(Math.floor(mins / 60) % 24).padStart(2,'0')}:${String(mins % 60).padStart(2,'0')}`;
}

function parseTime(raw) {
  const t = norm(raw);
  const m1 = raw.match(/(\d{1,2}):(\d{2})/);
  if (m1) return `${m1[1].padStart(2,'0')}:${m1[2]}`;
  const m2 = t.match(/(\d{1,2})\s*(?:hs?|horas?)/);
  if (m2) return `${String(+m2[1]).padStart(2,'0')}:00`;
  const m3 = t.match(/(\d{1,2})(?:\s*(?:de\s+la\s+)?(?:tarde|noche))/);
  if (m3) { const h = +m3[1] < 12 ? +m3[1] + 12 : +m3[1]; return `${String(h).padStart(2,'0')}:00`; }
  const m4 = t.match(/(\d{1,2})(?:\s*(?:de\s+la\s+)?ma[nñ]ana)/);
  if (m4) return `${String(+m4[1]).padStart(2,'0')}:00`;
  const m5 = t.match(/^(\d{1,2})$/);
  if (m5) return `${String(+m5[1]).padStart(2,'0')}:00`;
  return null;
}

function saveReserva() {
  const url      = cfg().webhookUrl;
  if (!url || !url.startsWith('http')) return false;
  const totalHrs = 4 + state.extraHours;
  const endTime  = calcEndTime(state.startTime, totalHrs);
  const id       = 'bot-rsv-' + Date.now();
  const fechaStr = `${String(state.date.getDate()).padStart(2,'0')}/${String(state.date.getMonth()+1).padStart(2,'0')}/${state.date.getFullYear()}`;
  const dayType  = isWeekend(state.date) ? 'weekend' : 'weekday';

  const payload = {
    'ID':              id,
    'Tipo':            'reserva',
    'Nombre guardado': state.eventName || '',
    'Fecha':           fechaStr,
    'Nombre evento':   state.eventName || '',
    'Hora inicio':     state.startTime,
    'Hora fin':        endTime,
    'Duración (hs)':   totalHrs,
    'Tipo de día':     dayType === 'weekday' ? 'Lunes–Jueves' : 'Vie/Sáb/Dom/Fer',
    'Nº niños':        state.kids,
    'Menú niños':      state.kidsMenu === 'alt' ? 'Alternativo' : 'Básico',
    'Nº adultos':      state.adults,
    'Menú adultos':    ADULT_MENU_NAMES[state.adultsMenu || 'none'],
    'Horas extra':     state.extraHours,
    'Personal extra':  state.extraStaff,
    'Total ($)':       state.total,
    'Descuento valor': '',
    'Descuento tipo':  '',
    'Descripción':     state.comments || '',
    'Notas':           'Creado desde chatbot',
    'Guardado el':     new Date().toISOString()
  };

  // Guardar en sheet
  fetch(url, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain' },
    body:    JSON.stringify(payload)
  }).catch(() => {});

  // Guardar en localStorage (compatible con presupuesto-salon.html)
  try {
    const saves = JSON.parse(localStorage.getItem('salonSaves') || '[]');
    saves.unshift({
      id, status: 'reserva', name: state.eventName || fechaStr,
      total: state.total, synced: true, savedAt: new Date().toISOString(),
      form: {
        eventDate: dateISO(state.date), dayType,
        numKids: String(state.kids), numAdults: String(state.adults),
        kidsMenu: state.kidsMenu || 'basic', adultsMenu: state.adultsMenu || 'none',
        extraHours: String(state.extraHours), extraStaff: String(state.extraStaff),
        discValue: '0', discountType: 'none',
        eventName: state.eventName || '',
        startTime: state.startTime, eventDesc: state.comments || '', eventOthers: ''
      }
    });
    localStorage.setItem('salonSaves', JSON.stringify(saves));
  } catch(e) {}

  return true;
}

function buildReservaSummary() {
  const totalHrs = 4 + state.extraHours;
  const endTime  = calcEndTime(state.startTime, totalHrs);
  const menuK    = KIDS_MENU_NAMES[state.kidsMenu   || 'basic'];
  const menuA    = ADULT_MENU_NAMES[state.adultsMenu || 'none'];

  let t = `📋 *Resumen de la reserva*\n\n`;
  t += `🎉 ${state.eventName}\n`;
  t += `📅 ${fmtDate(state.date)}\n`;
  t += `🕐 ${state.startTime} → ${endTime} (${totalHrs} hs)\n`;
  t += `👶 ${state.kids} niños — ${menuK}\n`;
  t += `🧑 ${state.adults} adultos — ${menuA}\n`;
  if (state.extraStaff > 0) t += `👤 ${state.extraStaff} personal adicional\n`;
  if (state.comments)        t += `💬 ${state.comments}\n`;
  t += `\n💰 *Total: ${fmtCur(state.total)}*`;
  return t;
}

// ═══════════════════════════════════════════════════════════════
//  FLUJO RESERVAS
// ═══════════════════════════════════════════════════════════════
async function startReservaFlow() {
  state.step = 'reserva_select';
  const url = cfg().webhookUrl;
  if (!url || !url.startsWith('http')) {
    botMsg('No hay webhook configurado. Configuralo en presupuesto-salon.html → Admin.');
    state.step = 'done'; return;
  }

  botMsg('Buscando presupuestos guardados...', [], 500);

  try {
    const res  = await fetch(`${url}?action=getData&tipo=presupuesto`);
    const data = await res.json();
    const rows = data.presupuestos || [];

    // Filtrar desde hoy en adelante
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const futuros = rows.filter(p => {
      if (!p.Fecha) return false;
      const [d,m,y] = p.Fecha.split('/');
      return new Date(+y, +m-1, +d) >= hoy;
    }).sort((a,b) => {
      const [d1,m1,y1] = a.Fecha.split('/'); const [d2,m2,y2] = b.Fecha.split('/');
      return new Date(+y1,+m1-1,+d1) - new Date(+y2,+m2-1,+d2);
    });

    if (futuros.length === 0) {
      botMsg('No encontré presupuestos guardados desde hoy. Primero guardá un presupuesto y volvé a intentar.');
      state.step = 'done'; return;
    }

    state._presCache = futuros;
    const opts = futuros.slice(0, 6).map(p => ({
      label: `📅 ${p.Fecha} — ${p['Nombre guardado'] || 'Sin nombre'} (${p['Nº niños']}N / ${p['Nº adultos']}A)`,
      val:   '__pres__' + p.ID
    }));
    opts.push({ label: '❌ Cancelar', val: '__cancel_reserva__' });
    botMsg('¿Qué presupuesto convertís en reserva?', opts);

  } catch(e) {
    botMsg('No pude cargar los presupuestos. Revisá la conexión e intentá de nuevo.');
    state.step = 'done';
  }
}

function selectPresupuesto(id) {
  const pres = state._presCache.find(p => p.ID === id);
  if (!pres) { botMsg('No encontré ese presupuesto.'); return; }

  // Cargar datos del presupuesto en el state
  const [d,m,y] = pres.Fecha.split('/');
  state.date      = new Date(+y, +m-1, +d);
  state.kids      = parseInt(pres['Nº niños'])    || 0;
  state.adults    = parseInt(pres['Nº adultos'])   || 0;
  state.extraHours= parseInt(pres['Horas extra'])  || 0;
  state.extraStaff= parseInt(pres['Personal extra'])|| 0;
  state.comments  = pres['Descripción'] || '';
  state.clientName= pres['Nombre guardado'] || '';
  state.total     = parseInt(pres['Total ($)'])     || 0;
  const km = { 'Básico':'basic','Alternativo':'alt' };
  const am = { 'Traen su comida':'none','Solo pizzas':'pizza','Pizzas y calzones':'pizza_calzone','Pizzas, calzones y chivitos':'pizza_calzone_chivito' };
  state.kidsMenu   = km[pres['Menú niños']]  || 'basic';
  state.adultsMenu = am[pres['Menú adultos']]|| 'none';
  state._selectedPresId = id;
  state.extrasAsked = true;
  calculate(); // recalcular para consistencia

  state.step = 'reserva_collecting';
  state.eventName = null; state.startTime = null;
  handleReservaCollecting();
}

function handleReservaCollecting() {
  if (!state.eventName) {
    botMsg(`Bien, presupuesto del *${fmtDate(state.date)}*.\n¿Cómo se llama el evento? (Ej: "Cumpleaños de Sofía")`);
    state._waitingFor = 'eventName';
    return;
  }
  if (!state.startTime) {
    botMsg('¿A qué hora empieza? (Ej: 18:00, 6 de la tarde)');
    state._waitingFor = 'startTime';
    return;
  }
  // Todo completo → mostrar resumen
  state.step = 'reserva_confirm';
  botMsg(buildReservaSummary(), [
    { label: '💾 Guardar reserva', val: '__save_reserva__' },
    { label: '✏️ Modificar',       val: '__edit_reserva__' },
  ]);
}

// ═══════════════════════════════════════════════════════════════
//  MOTOR DE CONVERSACIÓN
// ═══════════════════════════════════════════════════════════════
function getNextMissing() {
  if (state.kids   === null && state.adults === null && !state.date) return 'ask_all';
  if (state.kids   === null && state.adults === null)                return 'ask_people';
  if (state.kids   === null)  return 'ask_kids';
  if (state.adults === null)  return 'ask_adults';
  if (!state.date)            return 'ask_date';
  if (!state.kidsMenu || !state.adultsMenu) return 'ask_menus';
  if (!state.extrasAsked)     return 'ask_extras';
  return 'calculate';
}

function showSummaryWithButtons() {
  calculate();
  botMsg(buildSummary(), [
    { label: '💾 Guardar', val: '__save__' },
    { label: '✏️ Modificar', val: '__edit__' },
  ]);
  state.step = 'confirm';
}

function handleMissing() {
  const next = getNextMissing();
  switch (next) {

    case 'ask_all':
      botMsg('¿Para cuántos niños y adultos, y para qué fecha es el evento?');
      break;

    case 'ask_people':
      botMsg('¿Cuántos niños y cuántos adultos van a ser?');
      break;

    case 'ask_kids':
      botMsg('¿Cuántos niños van a ser?');
      break;

    case 'ask_adults':
      botMsg('¿Y cuántos adultos?');
      break;

    case 'ask_date':
      botMsg('¿Para qué fecha sería el evento?');
      break;

    case 'ask_menus': {
      const dn = isWeekend(state.date) ? 'fin de semana 🎉' : 'día de semana';
      botMsg(
        `Perfecto, el *${fmtDate(state.date)}* es ${dn}.\n¿Con qué menú?`,
        [
          { label: '🍕 Básico + Pizzas',   val: 'menu basico ninos y pizzas adultos' },
          { label: '🥙 Básico + Completo', val: 'menu basico ninos y completo adultos' },
          { label: '⭐ Alt + Pizzas',       val: 'menu alternativo ninos y pizzas adultos' },
          { label: '🚫 Adultos sin menú',  val: 'menu basico ninos traen comida adultos' },
        ]
      );
      break;
    }

    case 'ask_extras': {
      state.extrasAsked = true;
      botMsg(
        '¿Necesitás agregar algo más al presupuesto?',
        [
          { label: '✅ No, está bien',     val: '__no_extras__' },
          { label: '⏱ Horas extra',        val: '__want_hours__' },
          { label: '👤 Personal adicional', val: '__want_staff__' },
          { label: '💬 Comentario',         val: '__want_comment__' },
        ]
      );
      break;
    }

    case 'calculate':
      showSummaryWithButtons();
      break;
  }
}

function processMessage(raw) {
  if (raw === '__reset__') { resetChat(); return; }

  const t = norm(raw);

  // ── Trigger reserva ───────────────────────────────────────
  if (/\breserva\b/.test(t) &&
      !['reserva_select','reserva_collecting','reserva_confirm','reserva_editing'].includes(state.step)) {
    startReservaFlow();
    return;
  }

  // ── Selección de presupuesto ──────────────────────────────
  if (raw.startsWith('__pres__')) {
    selectPresupuesto(raw.replace('__pres__', ''));
    return;
  }
  if (raw === '__cancel_reserva__') {
    state.step = 'done';
    botMsg('Cancelado. ¿Qué más necesitás?', [
      { label: '🔄 Nuevo presupuesto', val: '__reset__' }
    ]);
    return;
  }

  // ── Esperando eventName o startTime ──────────────────────
  if (state._waitingFor === 'eventName') {
    state.eventName = raw.trim();
    state._waitingFor = null;
    handleReservaCollecting();
    return;
  }
  if (state._waitingFor === 'startTime') {
    const parsed = parseTime(raw);
    if (!parsed) {
      botMsg('No entendí la hora. Escribila así: 18:00 o "6 de la tarde"');
      return;
    }
    state.startTime = parsed;
    state._waitingFor = null;
    handleReservaCollecting();
    return;
  }

  // ── Estado: reserva_confirm ───────────────────────────────
  if (state.step === 'reserva_confirm') {
    if (raw === '__save_reserva__' || /^(guarda|confirma|dale|si|sí|listo|ok)/.test(t)) {
      const saved = saveReserva();
      state.step  = 'done';
      if (saved) botMsg('✅ ¡Reserva guardada en Google Sheets!', [], 400);
      setTimeout(() => {
        botMsg('¿Necesitás algo más?', [
          { label: '🔄 Nuevo presupuesto', val: '__reset__' },
          { label: '📋 Otra reserva',      val: 'reserva' },
          { label: '✅ No, gracias',        val: '__bye__' },
        ]);
      }, 900);
      return;
    }
    if (raw === '__edit_reserva__' || /cambi|modific/.test(t)) {
      state.step = 'reserva_editing';
      botMsg('¿Qué querés cambiar? (nombre del evento, hora de inicio)');
      return;
    }
    return;
  }

  // ── Estado: reserva_editing ───────────────────────────────
  if (state.step === 'reserva_editing') {
    if (/nombre|evento/.test(t)) state.eventName = null;
    if (/hora|inicio/.test(t))   state.startTime = null;
    // Si dijo algo concreto, intentar extraerlo
    const tp = parseTime(raw);
    if (tp) { state.startTime = tp; }
    else if (raw.trim().length > 3 && !/cambi|modific|hora|inicio/.test(t)) {
      state.eventName = raw.trim(); // asumir que es el nombre del evento
    }
    state.step = 'reserva_collecting';
    handleReservaCollecting();
    return;
  }

  // ── Quick replies de extras ───────────────────────────────
  if (raw === '__no_extras__') {
    handleMissing(); // va a 'calculate' → muestra resumen
    return;
  }
  if (raw === '__want_hours__') {
    botMsg('¿Cuántas horas extra necesitás?');
    state._waitingFor = 'hours';
    return;
  }
  if (raw === '__want_staff__') {
    botMsg('¿Cuántas personas de personal adicional?');
    state._waitingFor = 'staff';
    return;
  }
  if (raw === '__want_comment__') {
    botMsg('Contame, ¿qué querés agregar como comentario?');
    state._waitingFor = 'comment';
    return;
  }

  // ── Esperando respuesta puntual ───────────────────────────
  if (state._waitingFor === 'hours') {
    const m = t.match(/\d+/);
    if (m) state.extraHours = +m[0];
    state._waitingFor = null;
    handleMissing();
    return;
  }
  if (state._waitingFor === 'staff') {
    const m = t.match(/\d+/);
    if (m) state.extraStaff = +m[0];
    state._waitingFor = null;
    handleMissing();
    return;
  }
  if (state._waitingFor === 'comment') {
    state.comments = raw;
    state._waitingFor = null;
    handleMissing();
    return;
  }

  // ── Estado: confirm ───────────────────────────────────────
  if (state.step === 'confirm') {
    if (raw === '__save__' || /^(guarda|confirma|dale|si|sí|listo|ok)/.test(t)) {
      const saved = saveToSheet();
      const wapp  = buildWhatsApp();
      state.step  = 'done';
      if (saved) botMsg('✅ ¡Guardado en Google Sheets!', [], 300);
      setTimeout(() => showWappCard(wapp, saved), saved ? 900 : 300);
      setTimeout(() => {
        botMsg('¿Necesitás otro presupuesto?', [
          { label: '🔄 Sí, nuevo',   val: '__reset__' },
          { label: '✅ No, gracias', val: '__bye__' },
        ]);
      }, saved ? 1500 : 900);
      return;
    }
    if (raw === '__edit__' || /cambi|modific|edit/.test(t)) {
      state.step = 'editing';
      botMsg('¿Qué querés cambiar?\n(fecha, niños, adultos, menú, horas, personal, comentario…)');
      return;
    }
    // Escribió algo libre en confirm → intentar extraer y recalcular
    extractFromText(raw);
    calculate();
    botMsg(buildSummary(), [
      { label: '💾 Guardar', val: '__save__' },
      { label: '✏️ Modificar', val: '__edit__' },
    ]);
    return;
  }

  // ── Estado: editing ───────────────────────────────────────
  if (state.step === 'editing') {
    // Borrar el campo que mencionó
    if (/fecha|dia|fech/.test(t))                             state.date = null;
    if (/nino|chico|menor/.test(t) && !/adulto/.test(t))     state.kids = null;
    if (/adulto|mayor|grande/.test(t) && !/nino/.test(t))    state.adults = null;
    if (/menu|comi/.test(t))        { state.kidsMenu = null; state.adultsMenu = null; }
    if (/hora|duraci/.test(t))        state.extraHours = 0;
    if (/personal|staff/.test(t))     state.extraStaff = 0;
    if (/comentar|nota/.test(t))      state.comments = '';

    // Intentar extraer de lo que dijeron
    extractFromText(raw);
    state.step = 'start';

    // Si cambiaron algo de los mandatorios, volver a preguntar extras también
    if (!state.date || state.kids === null || state.adults === null ||
        !state.kidsMenu || !state.adultsMenu) {
      state.extrasAsked = false;
    }

    handleMissing();
    return;
  }

  // ── Estado: done ──────────────────────────────────────────
  if (state.step === 'done') {
    if (raw === '__bye__' || /^(no|gracias|listo|ok|chau)/.test(t)) {
      botMsg('¡Hasta pronto! 👋');
      return;
    }
    resetState();
    extractFromText(raw);
    handleMissing();
    return;
  }

  // ── Estado normal (start): extraer y manejar ─────────────
  extractFromText(raw);
  handleMissing();
}

// ═══════════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════════
let _activeQR = null;  // referencia al último bloque de quick replies

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtBubble(s) {
  return escHtml(s)
    .replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}
function nowTime() {
  return new Date().toLocaleTimeString('es-UY', { hour:'2-digit', minute:'2-digit' });
}
function scrollDown() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function addUserBubble(text) {
  // Ocultar quick replies anteriores
  if (_activeQR) { _activeQR.remove(); _activeQR = null; }

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user';
  wrap.innerHTML =
    `<div class="bubble">${fmtBubble(text)}</div>` +
    `<div class="msg-time">${nowTime()}</div>`;
  document.getElementById('messages').appendChild(wrap);
  scrollDown();
}

function botMsg(text, quickReplies = [], delay = null) {
  const msgs = document.getElementById('messages');
  const typingDelay = delay !== null ? delay : Math.min(300 + text.length * 12, 1400);

  // Indicador "escribiendo…"
  const typing = document.createElement('div');
  typing.className = 'typing-row';
  typing.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(typing);
  scrollDown();

  setTimeout(() => {
    msgs.removeChild(typing);

    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap bot';
    wrap.innerHTML =
      `<div class="bubble">${fmtBubble(text)}</div>` +
      `<div class="msg-time">${nowTime()}</div>`;
    msgs.appendChild(wrap);

    if (quickReplies.length > 0) {
      const qrDiv = document.createElement('div');
      qrDiv.className = 'qr-row';
      quickReplies.forEach(qr => {
        const btn = document.createElement('button');
        btn.className = 'qr-btn';
        btn.textContent = qr.label;
        btn.onclick = () => {
          qrDiv.remove(); _activeQR = null;
          addUserBubble(qr.label);
          setTimeout(() => processMessage(qr.val), 80);
        };
        qrDiv.appendChild(btn);
      });
      msgs.appendChild(qrDiv);
      _activeQR = qrDiv;
    }
    scrollDown();
  }, typingDelay);
}

function showWappCard(text, savedToSheet) {
  const msgs = document.getElementById('messages');
  if (_activeQR) { _activeQR.remove(); _activeQR = null; }

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.padding = '6px';

  const label = document.createElement('div');
  label.style.cssText = 'font-size:.73rem;color:#555;padding:4px 6px 2px;font-weight:600';
  label.textContent = '📋 Listo para copiar:';

  const card = document.createElement('div');
  card.className = 'wapp-card';
  card.id = 'wapp-text-' + Date.now();
  card.textContent = text;

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = '📋 Copiar para WhatsApp';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(card.textContent).then(() => {
      copyBtn.textContent = '✅ ¡Copiado!';
      setTimeout(() => copyBtn.textContent = '📋 Copiar para WhatsApp', 2200);
    });
  };

  bubble.appendChild(label);
  bubble.appendChild(card);
  bubble.appendChild(copyBtn);

  if (savedToSheet) {
    const pill = document.createElement('div');
    pill.className = 'saved-pill';
    pill.textContent = '✅ Guardado en el sheet';
    bubble.appendChild(pill);
  }

  wrap.appendChild(bubble);
  wrap.innerHTML += `<div class="msg-time">${nowTime()}</div>`;
  wrap.insertBefore(bubble, wrap.lastChild);  // re-insert before time
  wrap.replaceChildren(bubble, wrap.lastChild);
  msgs.appendChild(wrap);
  scrollDown();
}

// ═══════════════════════════════════════════════════════════════
//  VOZ
// ═══════════════════════════════════════════════════════════════
let recognition = null, isListening = false;

function micReset() {
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('userInput').placeholder = 'Ej: 20 niños y 30 adultos para el sábado…';
}

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    botMsg('Tu navegador no soporta reconocimiento de voz.\n\nEn el celular podés usar el 🎤 del teclado para dictar directamente en el campo de texto.', [], 200);
    return;
  }

  // HTTPS requerido en mobile
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    botMsg('El micrófono requiere HTTPS. Usá el 🎤 del teclado de tu celular para dictar en el campo de texto 👆', [], 200);
    return;
  }

  if (isListening) { recognition.stop(); return; }

  recognition = new SR();
  // es-UY no siempre está disponible en mobile; caemos a es como fallback
  recognition.lang = 'es';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('userInput').placeholder = '🎤 Escuchando… tocá ⏹ para parar';
  };

  recognition.onresult = e => {
    micReset();
    const t = e.results[0][0].transcript;
    document.getElementById('userInput').value = t;
    sendMessage();
  };

  recognition.onerror = e => {
    micReset();
    const msgs = {
      'not-allowed':       'Permiso de micrófono denegado. Habilitalo en la configuración del navegador.',
      'no-speech':         'No se detectó voz. Intentá de nuevo.',
      'network':           'Error de red. Revisá tu conexión e intentá de nuevo.',
      'service-not-allowed': 'Servicio de voz no disponible en este navegador/protocolo.',
      'aborted':           null,   // cancelado por el usuario, no mostrar nada
    };
    const msg = msgs[e.error];
    if (msg) botMsg(msg, [], 100);
  };

  recognition.onend = () => { micReset(); };

  try {
    recognition.start();
  } catch(err) {
    micReset();
    botMsg('No se pudo iniciar el micrófono. Usá el 🎤 del teclado de tu celular para dictar.', [], 100);
  }
}

// ═══════════════════════════════════════════════════════════════
//  ENVIAR / RESET
// ═══════════════════════════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserBubble(text);
  setTimeout(() => processMessage(text), 80);
}

function resetChat() {
  resetState();
  document.getElementById('messages').innerHTML = '';
  _activeQR = null;
  greeting();
}

function greeting() {
  botMsg(
    '¡Hola! 👋 Soy el asistente del Salón.\n\nContame para cuántas personas y para qué fecha necesitás el presupuesto, y te calculo el total al toque.',
    [], 600
  );
}

// ── Init ─────────────────────────────────────────────────────
resetState();
greeting();
</script>
