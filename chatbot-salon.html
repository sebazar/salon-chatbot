<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎉 Asistente Salón</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:      #25d366;
      --green-dark: #128c7e;
      --bg:         #e5ddd5;
      --user-bg:    #dcf8c6;
      --bot-bg:     #ffffff;
      --header-bg:  #075e54;
      --radius:     18px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────── */
    #header {
      background: var(--header-bg);
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,.25);
      flex-shrink: 0;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--green); display: flex; align-items: center;
      justify-content: center; font-size: 1.3rem; flex-shrink: 0;
    }
    .hinfo { flex: 1; }
    .hname { font-size: .97rem; font-weight: 600; }
    .hsub  { font-size: .68rem; opacity: .75; }
    .reset-btn {
      background: none; border: none; color: #fff;
      opacity: .75; cursor: pointer; font-size: .78rem;
      padding: 5px 9px; border-radius: 6px; transition: opacity .15s;
    }
    .reset-btn:hover { opacity: 1; background: rgba(255,255,255,.15); }

    /* ── Messages ─────────────────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto; padding: 10px 8px 6px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .msg-wrap { display: flex; flex-direction: column; margin-bottom: 2px; }
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.bot  { align-items: flex-start; }

    .bubble {
      max-width: min(78vw, 360px);
      padding: 8px 11px;
      border-radius: var(--radius);
      font-size: .875rem; line-height: 1.45;
      word-break: break-word; white-space: pre-wrap;
      box-shadow: 0 1px 2px rgba(0,0,0,.13);
    }
    .user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
    .bot  .bubble { background: var(--bot-bg);  border-bottom-left-radius: 4px; }

    .msg-time {
      font-size: .62rem; color: #888;
      padding: 2px 5px 0;
    }

    /* ── Quick replies ────────────────────────────────────── */
    .qr-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 4px 2px 6px 2px;
      max-width: min(90vw, 420px);
    }
    .qr-btn {
      background: #fff; border: 1.5px solid var(--green);
      color: var(--green-dark); border-radius: 20px;
      padding: 5px 13px; font-size: .82rem; font-weight: 500;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .qr-btn:hover, .qr-btn:active { background: var(--green); color: #fff; }

    /* ── Typing indicator ─────────────────────────────────── */
    .typing-row { display: flex; align-items: flex-start; padding: 2px 0; }
    .typing-bubble {
      background: var(--bot-bg); border-radius: var(--radius); border-bottom-left-radius: 4px;
      padding: 10px 14px; display: flex; gap: 4px; align-items: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.12);
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #aaa;
      animation: bounce .85s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .17s; }
    .dot:nth-child(3) { animation-delay: .34s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }

    /* ── WhatsApp card ────────────────────────────────────── */
    .wapp-card {
      background: #f0fdf4; border: 1.5px solid #86efac;
      border-radius: 10px; padding: 10px;
      font-size: .78rem; font-family: 'Courier New', monospace;
      white-space: pre-wrap; word-break: break-word;
      max-height: 280px; overflow-y: auto; margin-top: 6px;
    }
    .copy-btn {
      display: block; width: 100%; margin-top: 7px;
      padding: 8px; background: var(--green); color: #fff;
      border: none; border-radius: 8px; font-size: .85rem;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .copy-btn:hover { background: var(--green-dark); }
    .saved-pill {
      display: inline-block; margin-top: 5px;
      background: #dcfce7; color: #15803d;
      border-radius: 20px; padding: 2px 10px; font-size: .73rem;
    }

    /* ── Input bar ────────────────────────────────────────── */
    #input-bar {
      background: #f0f0f0; padding: 7px 10px;
      display: flex; gap: 7px; align-items: center;
      border-top: 1px solid #d0d0d0; flex-shrink: 0;
    }
    #userInput {
      flex: 1; border: none; border-radius: 22px;
      padding: 9px 15px; font-size: .9rem; outline: none;
      background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.1);
      resize: none; height: 42px; line-height: 1.4;
    }
    .icon-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 1.05rem;
      transition: all .15s; flex-shrink: 0;
    }
    #micBtn { background: #e0e0e0; color: #555; }
    #micBtn.listening {
      background: #fee2e2; color: #dc2626;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }
    #sendBtn { background: var(--green); color: #fff; }
    #sendBtn:hover { background: var(--green-dark); }
  </style>
</head>
<body>

<div id="header">
  <div class="avatar">🎉</div>
  <div class="hinfo">
    <div class="hname">Asistente Salón</div>
    <div class="hsub">Presupuestos al instante</div>
  </div>
  <button class="reset-btn" onclick="resetChat()">↺ Nuevo</button>
</div>

<div id="messages"></div>

<div id="input-bar">
  <input type="text" id="userInput"
    placeholder="Ej: 20 niños y 30 adultos para el sábado…"
    autocomplete="off"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
  <button class="icon-btn" id="micBtn" onclick="toggleVoice()" title="Hablar">🎤</button>
  <button class="icon-btn" id="sendBtn"  onclick="sendMessage()"  title="Enviar">➤</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG — cargada desde config.json en GitHub Pages
// ═══════════════════════════════════════════════════════════════
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxwn2hPDk6ZiBN5qrJ7rNjHIWi3UkmZkcvJDLtbQwjAWyIpbPLuoqWGrnu2xz0_wDjQhQ/exec';
const CONFIG_URL  = 'https://sebazar.github.io/salon-chatbot/config.json';

const DEFAULTS = {
  baseWeekday: 18500,  baseWeekend: 20900,  extraHour: 4900,
  kidsIncluded: 20,    kidsBasic: 220,       kidsAlt: 350,
  kidsUpgradeFlat: 2600,
  adultsSmallThreshold: 20, adultsFreeMenuThreshold: 10,
  menuPizzaSmall: 450,
  menuPizza: 350,      menuPizzaCalzone: 450, menuFull: 500,
  recIncluded: 2,      kidsPerRec: 10,        adultsPerWaiter: 20,
  staffCost: 1900,     staffExtraHr: 450,
  webhookUrl: WEBHOOK_URL
};

let _cfg = { ...DEFAULTS };
async function initConfig() {
  try {
    const r = await fetch(CONFIG_URL + '?_=' + Date.now());
    if (r.ok) {
      const remote = await r.json();
      if (!remote.webhookUrl) delete remote.webhookUrl;
      _cfg = { ...DEFAULTS, ...remote };
    }
  } catch(e) { console.warn('Config: usando defaults.', e); }
}
const cfg = () => _cfg;
const fmtCur = n => '$\u202f' + Math.round(n).toLocaleString('es-UY');

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let state = {};
function resetState() {
  state = {
    kids: null, adults: null, date: null,
    kidsMenu: null, adultsMenu: null,
    extraHours: 0, extraStaff: 0, comments: '',
    clientName: null,
    extrasAsked: false,
    _waitingFor: null,
    step: 'start',   // start | confirm | editing_menu | done
                     // reserva: reserva_select | reserva_collecting | reserva_confirm | reserva_editing_menu
    total: null, _calc: null,
    // Ajustes de precio
    priceOverride: null,
    discount: { type: 'none', value: 0 },
    // Campos extra
    notes: '',
    // Nuevos campos (reserva y presupuesto)
    edad: null,           // edad del cumpleañero/a (null = no preguntado aún)
    sena: null,           // seña en $ (null = no preguntado aún)
    roman: null,          // 'Recreador' | 'Salon' | 'No va' (null = no preguntado)
    senaFormaPago: null,  // 'Banco Seba' | 'Banco Vir' | 'Efectivo Fede' (null = no preguntado)
    senaConcepto: 'Seña', // concepto de la entrada
    // Reserva
    eventName: null, startTime: null,
    _selectedPresId: null, _presCache: [],
    _reservaFromScratch: false,
    _dateWarningShown: false
  };
}

// ═══════════════════════════════════════════════════════════════
//  DATE HELPERS
// ═══════════════════════════════════════════════════════════════
const MONTHS_ES = {
  enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,
  julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12
};
// keys sin acento (el texto se normaliza antes de buscar)
const WEEKDAYS_ES = {
  domingo:0,lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6
};

function norm(s) {
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function nextOccurrence(weekday) {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = (weekday - today.getDay() + 7) % 7 || 7;
  const d = new Date(today); d.setDate(today.getDate() + diff);
  return d;
}

function parseDateFromText(raw) {
  const t = norm(raw);

  // hoy / mañana
  if (/\bhoy\b/.test(t)) { const d = new Date(); d.setHours(0,0,0,0); return d; }
  if (/\bmanana\b/.test(t)) { const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+1); return d; }

  // "el sábado", "próximo viernes", "sábado que viene"
  for (const [name, num] of Object.entries(WEEKDAYS_ES)) {
    if (new RegExp('\\b' + name + '\\b').test(t)) return nextOccurrence(num);
  }

  // DD/MM o DD/MM/YYYY
  const slashM = t.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
  if (slashM) {
    const day = +slashM[1], mon = +slashM[2] - 1;
    const yr  = slashM[3]
      ? (slashM[3].length === 2 ? 2000 + +slashM[3] : +slashM[3])
      : new Date().getFullYear();
    const d = new Date(yr, mon, day);
    if (!isNaN(d)) return d;
  }

  // "el 20 de marzo" / "20 de marzo" / "20 marzo" / "20 marzo 2026"
  const monthPat = Object.keys(MONTHS_ES).join('|');
  const textM = t.match(
    new RegExp('\\b(\\d{1,2})\\s+(?:de\\s+)?(' + monthPat + ')(?:\\s+(?:de\\s+)?(\\d{4}))?')
  );
  if (textM) {
    const day = +textM[1], mon = MONTHS_ES[textM[2]] - 1;
    let yr = textM[3] ? +textM[3] : new Date().getFullYear();
    let d = new Date(yr, mon, day); d.setHours(0,0,0,0);
    if (d < new Date() && !textM[3]) d = new Date(yr + 1, mon, day);
    if (!isNaN(d)) return d;
  }

  return null;
}

const DAY_NAMES  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MON_NAMES  = ['enero','febrero','marzo','abril','mayo','junio',
                    'julio','agosto','septiembre','octubre','noviembre','diciembre'];

function fmtDate(d)    { return `${DAY_NAMES[d.getDay()]} ${d.getDate()} de ${MON_NAMES[d.getMonth()]}`; }
function isWeekend(d)  { const w = d.getDay(); return w === 0 || w === 5 || w === 6; }
function dateISO(d)    { return d.toISOString().split('T')[0]; }

// ═══════════════════════════════════════════════════════════════
//  EXTRACTOR  – saca datos de texto libre
// ═══════════════════════════════════════════════════════════════
function extractNumber(t, keywords) {
  for (const kw of keywords) {
    // "20 niños" o "niños: 20" o "niños(20)"
    const m1 = t.match(new RegExp('(\\d+)\\s*' + kw + 's?\\b'));
    if (m1) return +m1[1];
    const m2 = t.match(new RegExp(kw + 's?\\b.{0,25}?(\\d+)'));
    if (m2) return +m2[1];
  }
  return null;
}

function extractFromText(raw) {
  const t = norm(raw);

  // Niños
  const k = extractNumber(t, ['nino','nene','chico','menor','pibito','bebe','infante','kid','pequeno','gurí','guri']);
  if (k !== null) state.kids = k;

  // Adultos
  const a = extractNumber(t, ['adulto','grande','persona','mayor','invitado','pax']);
  if (a !== null) state.adults = a;

  // Horas extra ("6 horas" → 2 extra; "2 horas extra" → 2 extra)
  const exM = t.match(/(\d+)\s*hora\s*extra/);
  if (exM) { state.extraHours = +exM[1]; }
  else {
    const totalHrM = t.match(/(\d+)\s*hora/);
    if (totalHrM && +totalHrM[1] > 4) state.extraHours = +totalHrM[1] - 4;
  }

  // Personal extra ("2 personal extra", "1 persona adicional")
  const staffExM = t.match(/(\d+)\s*(?:personal|personas?)\s*(?:extra|adicional)/);
  if (staffExM) state.extraStaff = +staffExM[1];

  // Fecha
  const d = parseDateFromText(raw);
  if (d) state.date = d;

  // Menú niños
  if (/alternativ|menu alt|alt\b/.test(t))         state.kidsMenu = 'alt';
  else if (/basic|comida\s+nino|menu\s+nino/.test(t)) state.kidsMenu = 'basic';

  // Menú adultos
  if (/chivito|completo|full\b/.test(t))            state.adultsMenu = 'pizza_calzone_chivito';
  else if (/calzon/.test(t))                         state.adultsMenu = 'pizza_calzone';
  else if (/pizza|piza/.test(t))                     state.adultsMenu = 'pizza';
  else if (/traen|sin men|no comen|propio/.test(t))  state.adultsMenu = 'none';
  // Forzar a pizza si el grupo es pequeño y se eligió una opción no disponible
  if (state.adultsMenu && state.adultsMenu !== 'none' && state.adults !== null) {
    const _C = cfg();
    const _thr = _C.adultsSmallThreshold || 20;
    if (state.adults < _thr && state.adultsMenu !== 'pizza') state.adultsMenu = 'pizza';
  }

  // Nombre del cliente
  const nameM = raw.match(
    /(?:para\s+(?:los?\s+|la\s+|las\s+)?|a\s+nombre\s+de\s+|apellido\s*[:=]?\s*|familia\s+)([A-ZÁÉÍÓÚÑ][a-záéíóúñ]{2,}(?:\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]{2,})?)/
  );
  if (nameM && !state.clientName) state.clientName = nameM[1];
}

// ═══════════════════════════════════════════════════════════════
//  RECREADORES – escala escalonada (≤22→2 · 23-32→3 · 33-40→4 · 41+→1c/10)
// ═══════════════════════════════════════════════════════════════
function calcRecs(n) {
  if (n <= 0)  return 0;
  if (n <= 22) return 2;
  if (n <= 32) return 3;
  if (n <= 40) return 4;
  return Math.ceil(n / 10);
}

// ═══════════════════════════════════════════════════════════════
//  CÁLCULO  (misma lógica que presupuesto-salon.html)
// ═══════════════════════════════════════════════════════════════
function calculate() {
  const C       = cfg();
  const km      = state.kidsMenu   || 'basic';
  const am      = state.adultsMenu || 'pizza';
  const smallThr = C.adultsSmallThreshold    || 20;
  const freeThr  = C.adultsFreeMenuThreshold || 10;

  const basePrice = isWeekend(state.date) ? C.baseWeekend : C.baseWeekday;

  // ── Kids ──────────────────────────────────────────────────
  const kidsIncl     = Math.min(state.kids, C.kidsIncluded);
  const kidsExtra    = Math.max(0, state.kids - C.kidsIncluded);
  const kidsMenuPrc  = km === 'basic' ? C.kidsBasic : C.kidsAlt;
  const kidsExtraCst = kidsExtra * kidsMenuPrc;
  const kidsUpgrade  = km === 'alt' ? (C.kidsUpgradeFlat || 0) : 0;

  // ── Adults ────────────────────────────────────────────────
  let adultMenuPrc = 0;
  if (am !== 'none') {
    if (state.adults < smallThr) {
      adultMenuPrc = C.menuPizzaSmall;                        // 1–19: solo pizza $450
    } else {
      const prices = { pizza: C.menuPizza, pizza_calzone: C.menuPizzaCalzone, pizza_calzone_chivito: C.menuFull };
      adultMenuPrc = prices[am] || C.menuPizza;               // 20+: 3 opciones
    }
  }
  const adultMenuCst = state.adults * adultMenuPrc;

  // ── Staff ─────────────────────────────────────────────────
  const actualRecs = calcRecs(state.kids);
  // Mozo obligatorio desde freeThr adultos con menú
  // El primer mozo está incluido cuando hay hasta smallThr adultos
  const waiters    = (state.adults >= freeThr && am !== 'none')
                       ? Math.ceil(state.adults / C.adultsPerWaiter) : 0;
  const totalStaff = actualRecs + waiters + (state.extraStaff || 0);

  const salonExtraCst = state.extraHours * C.extraHour;
  const extraHrTotCst = salonExtraCst + totalStaff * state.extraHours * C.staffExtraHr;

  const recsExtra  = Math.max(0, actualRecs - C.recIncluded);
  const recsCst    = recsExtra  * C.staffCost;
  // El primer mozo siempre está incluido; los adicionales se cobran
  const waitersCst = Math.max(0, waiters - 1) * C.staffCost;
  const xStaffCst  = (state.extraStaff || 0) * C.staffCost;

  const total = basePrice + extraHrTotCst + kidsExtraCst + kidsUpgrade + adultMenuCst + recsCst + waitersCst + xStaffCst;
  let baseTotal  = Math.round(total / 100) * 100;
  let finalTotal = baseTotal;
  const disc = state.discount || { type: 'none', value: 0 };
  if (disc.type === 'pct'   && disc.value > 0) finalTotal = Math.round(finalTotal * (1 - disc.value / 100) / 100) * 100;
  if (disc.type === 'fixed' && disc.value > 0) finalTotal = Math.max(0, finalTotal - disc.value);
  if (state.priceOverride !== null) finalTotal = state.priceOverride;
  state._baseTotal = baseTotal;
  state.total      = finalTotal;
  state._calc = {
    C, basePrice, km, am, kidsMenuPrc, adultMenuPrc, smallThr, freeThr,
    kidsExtraCst, kidsUpgrade, adultMenuCst,
    recsCst, waitersCst, xStaffCst, extraHrTotCst, salonExtraCst,
    kidsIncl, kidsExtra, recsExtra, waiters, actualRecs
  };
  return state.total;
}

// ═══════════════════════════════════════════════════════════════
//  RESUMEN SENCILLO (para confirmar antes de guardar)
// ═══════════════════════════════════════════════════════════════
function buildSummary() {
  const menuK    = KIDS_MENU_NAMES[state.kidsMenu   || 'basic'];
  const menuA    = ADULT_MENU_NAMES[state.adultsMenu || 'pizza'];
  const totalHrs = 4 + state.extraHours;
  const dayLabel = isWeekend(state.date) ? 'fin de semana 🎉' : 'día de semana';

  const b = state._calc;

  let t = `📋 *Resumen del presupuesto*\n\n`;
  if (state.clientName) t += `👤 ${state.clientName}\n`;
  t += `📅 ${fmtDate(state.date)} — ${dayLabel}\n`;
  t += `⏱ ${totalHrs} hs\n\n`;

  // ── Desglose ──────────────────────────────────────────────
  if (b) t += `🏠 Base ${dayLabel}: ${fmtCur(b.basePrice)}\n`;

  // Niños
  t += `👶 ${state.kids} niños — ${menuK}\n`;
  if (b) {
    if (b.kidsUpgrade  > 0) t += `   └ Upgrade Nuggets: ${fmtCur(b.kidsUpgrade)}\n`;
    if (b.kidsExtraCst > 0) t += `   └ ${b.kidsExtra} niños extra: ${fmtCur(b.kidsExtraCst)}\n`;
  }

  // Adultos
  t += `🧑 ${state.adults} adultos — ${menuA}\n`;
  if (b && b.adultMenuCst > 0) t += `   └ Menú (${state.adults} × ${fmtCur(b.adultMenuPrc)}): ${fmtCur(b.adultMenuCst)}\n`;

  // Staff
  if (b) {
    if (b.actualRecs > 0) {
      t += `🎪 ${b.actualRecs} recreador${b.actualRecs > 1 ? 'es' : ''}`;
      t += b.recsCst > 0 ? ` — ${fmtCur(b.recsCst)} (${b.recsExtra} extra)\n` : ' (incluidos)\n';
    }
    if (b.waiters > 0) t += `🧑‍🍳 ${b.waiters} mozo${b.waiters > 1 ? 's' : ''}` + (b.waitersCst > 0 ? `: ${fmtCur(b.waitersCst)}\n` : ' (incluido)\n');
    if (state.extraStaff > 0 && b.xStaffCst > 0) t += `➕ ${state.extraStaff} personal extra: ${fmtCur(b.xStaffCst)}\n`;
  }

  // Horas extra
  if (b && b.extraHrTotCst > 0) t += `⏱ Horas extra: ${fmtCur(b.extraHrTotCst)}\n`;

  if (state.edad)    t += `\n🎂 Edad: ${state.edad} años\n`;
  if (state.roman)   t += `🎭 Roman: ${state.roman}\n`;
  if (state.comments) t += `\n💬 ${state.comments}\n`;
  if (state.notes)    t += `📝 ${state.notes}\n`;

  // ── Precio final ──────────────────────────────────────────
  const disc = state.discount || { type: 'none', value: 0 };
  const hasDisc = disc.type !== 'none' && disc.value > 0;
  const hasOvr  = state.priceOverride !== null;
  if ((hasDisc || hasOvr) && state._baseTotal) t += `\n~~Subtotal: ${fmtCur(state._baseTotal)}~~\n`;
  if (hasDisc && disc.type === 'pct')   t += `🏷️ Descuento: ${disc.value}%\n`;

  if (hasOvr) t += `✏️ Precio ajustado manualmente\n`;
  t += `\n💰 *Total: ${fmtCur(state.total)}*`;
  return t;
}

function calcEndTime(startTime, totalHrs) {
  const [h, m] = startTime.split(':').map(Number);
  const mins   = h * 60 + m + totalHrs * 60;
  return `${String(Math.floor(mins / 60) % 24).padStart(2,'0')}:${String(mins % 60).padStart(2,'0')}`;
}

function parseTime(raw) {
  const t = norm(raw);
  const m1 = raw.match(/(\d{1,2}):(\d{2})/);
  if (m1) return `${m1[1].padStart(2,'0')}:${m1[2]}`;
  const m2 = t.match(/(\d{1,2})\s*(?:hs?|horas?)/);
  if (m2) return `${String(+m2[1]).padStart(2,'0')}:00`;
  const m3 = t.match(/(\d{1,2})(?:\s*(?:de\s+la\s+)?(?:tarde|noche))/);
  if (m3) { const h = +m3[1] < 12 ? +m3[1] + 12 : +m3[1]; return `${String(h).padStart(2,'0')}:00`; }
  const m4 = t.match(/(\d{1,2})(?:\s*(?:de\s+la\s+)?ma[nñ]ana)/);
  if (m4) return `${String(+m4[1]).padStart(2,'0')}:00`;
  const m5 = t.match(/^(\d{1,2})$/);
  if (m5) return `${String(+m5[1]).padStart(2,'0')}:00`;
  return null;
}

// ═══════════════════════════════════════════════════════════════
//  VALIDACIONES DE CONFLICTO
// ═══════════════════════════════════════════════════════════════
function timeToMins(t) {
  const [h, m] = (t || '00:00').split(':').map(Number);
  return h * 60 + (m || 0);
}
function timesOverlap(s1, e1, s2, e2) {
  return timeToMins(s1) < timeToMins(e2) && timeToMins(s2) < timeToMins(e1);
}

async function fetchReservas() {
  const url = cfg().webhookUrl || WEBHOOK_URL;
  try {
    const res  = await fetch(`${url}?action=getData&tipo=reserva`);
    const data = await res.json();
    return data.reservas || [];
  } catch(e) { return []; }
}

// Muestra aviso (no bloquea) si ya hay reservas ese día — se llama al confirmar fecha en presupuesto
async function warnReservasForDate(date) {
  if (state._dateWarningShown) return;
  state._dateWarningShown = true;
  const reservas = await fetchReservas();
  const dateStr  = dateISO(date);
  const same = reservas.filter(r => {
    if (!r.Fecha) return false;
    const [d,m,y] = r.Fecha.split('/');
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}` === dateStr;
  });
  if (same.length === 0) return;
  const list = same.map(r =>
    `• ${r['Nombre evento'] || r['Nombre guardado'] || 'Sin nombre'}` +
    (r['Hora inicio'] ? ` (${r['Hora inicio']}–${r['Hora fin']})` : '')
  ).join('\n');
  botMsg(
    `⚠️ Ese día ya tiene ${same.length === 1 ? 'una reserva' : same.length + ' reservas'}:\n${list}`,
    [], 150
  );
}

// Devuelve la reserva que se superpone con el horario dado (o null). Excluye el presupuesto origen.
async function findTimeConflict(date, startTime, endTime) {
  const reservas = await fetchReservas();
  const dateStr  = dateISO(date);
  return reservas.find(r => {
    if (!r.Fecha || !r['Hora inicio'] || !r['Hora fin']) return false;
    if (r.ID === state._selectedPresId) return false;
    const [d,m,y] = r.Fecha.split('/');
    if (`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}` !== dateStr) return false;
    return timesOverlap(startTime, endTime, r['Hora inicio'], r['Hora fin']);
  }) || null;
}

// Carga presupuestos, aplica filtro y muestra lista para convertir
async function fetchAndShowPresupuestos(filterFn, noResultsMsg) {
  const url = cfg().webhookUrl || WEBHOOK_URL;
  botMsg('Buscando presupuestos...', [], 400);
  try {
    const res  = await fetch(`${url}?action=getData&tipo=presupuesto`);
    const data = await res.json();
    const rows = (data.presupuestos || []).filter(p => p.Fecha && filterFn(p));
    rows.sort((a,b) => {
      const [d1,m1,y1] = a.Fecha.split('/'); const [d2,m2,y2] = b.Fecha.split('/');
      return new Date(+y1,+m1-1,+d1) - new Date(+y2,+m2-1,+d2);
    });
    if (rows.length === 0) {
      botMsg(noResultsMsg, [
        { label: '🔄 Intentar otro filtro', val: 'reserva' },
        { label: '➕ Nueva desde cero',     val: '__reserva_nueva__' },
      ]);
      state.step = 'done'; return;
    }
    state._presCache = rows;
    const opts = rows.slice(0, 8).map(p => ({
      label: `📅 ${p.Fecha} — ${p['Nombre evento'] || 'Sin nombre'} (${p['Nº niños']}N/${p['Nº adultos']}A)`,
      val:   '__pres__' + p.ID
    }));
    opts.push({ label: '❌ Cancelar', val: '__cancel_reserva__' });
    botMsg('¿Qué presupuesto convertís en reserva?', opts);
  } catch(e) {
    botMsg('No pude cargar los presupuestos. Revisá la conexión e intentá de nuevo.');
    state.step = 'done';
  }
}

  state.senaFormaPago = null; state.senaConcepto = 'Seña';
  state.extraStaff = 0;
  state.eventName = null; state.startTime = null;
  state._selectedPresId = null; state._reservaFromScratch = true;
  state._dateWarningShown = false;
  state.step = 'start';
  botMsg('Vamos a crear una reserva nueva. ¿Para cuántos niños, cuántos adultos y qué fecha?');
}

function selectPresupuesto(id) {
  const pres = state._presCache.find(p => p.ID === id);
  if (!pres) { botMsg('No encontré ese presupuesto.'); return; }

  // Cargar datos del presupuesto en el state
  const [d,m,y] = pres.Fecha.split('/');
  state.date      = new Date(+y, +m-1, +d);
  state.kids      = parseInt(pres['Nº niños'])    || 0;
  state.adults    = parseInt(pres['Nº adultos'])   || 0;
  state.extraHours= parseInt(pres['Horas extra'])  || 0;
  state.extraStaff = 0;
  state.comments  = pres['Descripción'] || '';
  state.clientName= pres['Nombre evento'] || '';
  state.total     = parseInt(pres['Total ($)'])     || 0;
  state.edad      = pres['Edad']  ? parseInt(pres['Edad'])  : '';
  state.roman     = pres['Roman'] || '';
  state.sena      = pres['Seña ($)'] ? parseInt(pres['Seña ($)']) : 0;
  const km = { 'Panchos y snacks':'basic','Nuggets con papas fritas':'alt','Básico':'basic','Alternativo':'alt' };
  const am = { 'Traen su comida':'none','Solo pizzas':'pizza','Pizzas y calzones':'pizza_calzone','Pizzas, calzones y chivitos':'pizza_calzone_chivito' };
  state.kidsMenu   = km[pres['Menú niños']]  || 'basic';
  state.adultsMenu = am[pres['Menú adultos']]|| 'none';
  state._selectedPresId = id;
  state.extrasAsked = true;
  calculate(); // recalcular para consistencia

  state.step = 'reserva_collecting';
  state.eventName = null; state.startTime = null;
  handleReservaCollecting();
}

async function handleReservaCollecting() {
  if (!state.eventName) {
    botMsg(`Bien, presupuesto del *${fmtDate(state.date)}*.\n¿Cómo se llama el evento? (Ej: "Cumpleaños de Sofía")`);
    state._waitingFor = 'eventName';
    return;
  }
  if (!state.startTime) {
    botMsg('¿A qué hora empieza? (Ej: 18:00, 6 de la tarde)');
    state._waitingFor = 'startTime';
    return;
  }
  if (state.edad === null) {
    botMsg('¿Qué edad cumple el festejado/a?', [{ label: '⏭️ Omitir', val: '__skip_edad__' }]);
    state._waitingFor = 'edad_rsv';
    return;
  }
  if (state.roman === null) {
    botMsg('¿Roman en este evento?', [
      { label: '🎭 Recreador', val: '__roman_Recreador__' },
      { label: '🏛️ Salón',     val: '__roman_Salon__'    },
      { label: '❌ No va',      val: '__roman_No va__'    },
    ]);
    state._waitingFor = 'roman_rsv';
    return;
  }
  if (state.sena === null) {
    botMsg('¿Cuánto es la seña?', [{ label: '⏭️ Sin seña', val: '__skip_sena__' }]);
    state._waitingFor = 'sena_rsv';
    return;
  }
  // Forma de pago: solo si hay seña y no se preguntó aún
  if (state.sena > 0 && state.senaFormaPago === null) {
    botMsg('¿Forma de pago de la seña?', [
      { label: '🏦 Banco Seba',    val: '__fp_Banco Seba__'    },
      { label: '🏦 Banco Vir',     val: '__fp_Banco Vir__'     },
      { label: '💵 Efectivo Fede', val: '__fp_Efectivo Fede__' },
    ]);
    state._waitingFor = 'senaFormaPago_rsv';
    return;
  }

  // ── Validación de superposición horaria ──────────────────────
  const totalHrs = 4 + state.extraHours;
  const endTime  = calcEndTime(state.startTime, totalHrs);
  const conflict = await findTimeConflict(state.date, state.startTime, endTime);

  if (conflict) {
    // Bloquear: hay superposición, no se puede guardar
    state.step = 'reserva_collecting';
    state.startTime = null;
    state._waitingFor = 'startTime';
    botMsg(
      `⛔ Ese horario se superpone con *${conflict['Nombre evento'] || conflict['Nombre guardado'] || 'otra reserva'}* ` +
      `(${conflict['Hora inicio']}–${conflict['Hora fin']}).\n\n` +
      `No se puede guardar. ¿A qué hora empieza el evento?`
    );
    return;
  }

  // ── Sin conflicto: mostrar resumen ───────────────────────────
  state.step = 'reserva_confirm';
  botMsg(buildReservaSummary(), [
    { label: '💾 Guardar reserva',   val: '__save_reserva__'   },
    { label: '📋 Ver en formulario', val: '__open_form_rsv__'  },
    { label: '✏️ Modificar',         val: '__edit_reserva__'   },
  ]);
}

// ═══════════════════════════════════════════════════════════════
//  MOTOR DE CONVERSACIÓN
// ═══════════════════════════════════════════════════════════════
function getNextMissing() {
  if (state.kids   === null && state.adults === null && !state.date) return 'ask_all';
  if (state.kids   === null && state.adults === null)                return 'ask_people';
  if (state.kids   === null)  return 'ask_kids';
  if (state.adults === null)  return 'ask_adults';
  if (!state.date)            return 'ask_date';
  if (!state.kidsMenu || !state.adultsMenu) return 'ask_menus';
  if (!state.extrasAsked)     return 'ask_extras';
  return 'calculate';
}

function showSummaryWithButtons() {
  calculate();
  botMsg(buildSummary(), [
    { label: '💾 Guardar',            val: '__save__'              },
    { label: '📋 Ver en formulario',  val: '__open_form_pres__'    },
    { label: '✏️ Modificar',          val: '__edit__'              },
  ]);
  state.step = 'confirm';
}

async function handleMissing() {
  const next = getNextMissing();
  switch (next) {

    case 'ask_all':
      botMsg('¿Para cuántos niños y adultos, y para qué fecha es el evento?');
      break;

    case 'ask_people':
      botMsg('¿Cuántos niños y cuántos adultos van a ser?');
      break;

    case 'ask_kids':
      botMsg('¿Cuántos niños van a ser?');
      break;

    case 'ask_adults':
      botMsg('¿Y cuántos adultos?');
      break;

    case 'ask_date':
      botMsg('¿Para qué fecha sería el evento?');
      break;

    case 'ask_menus': {
      const dn = isWeekend(state.date) ? 'fin de semana 🎉' : 'día de semana';
      warnReservasForDate(state.date);
      botMsg(`Perfecto, el *${fmtDate(state.date)}* es ${dn}.\n¿Con qué menú?`, menuQuickReplies());
      break;
    }

    case 'ask_extras': {
      state.extrasAsked = true;
      botMsg(
        '¿Necesitás agregar algo más?',
        [
          { label: '✅ No, está bien',   val: '__no_extras__'   },
          { label: '⏱ Horas extra',      val: '__want_hours__'  },
          { label: '💬 Descripción',      val: '__want_comment__'},
          { label: '📝 Nota interna',     val: '__want_notes__'  },
        ]
      );
      break;
    }

    case 'calculate':
      if (state._reservaFromScratch) {
        calculate();
        state.step = 'reserva_collecting';
        handleReservaCollecting();
      } else {
        showSummaryWithButtons();
      }
      break;
  }
}

// ════════════════════════════════════════════
//  PREFILL FORM — envía datos al formulario padre
// ════════════════════════════════════════════
function buildFormPayload(isReserva) {
  const C      = cfg();
  const dt     = state.date ? state.date.toISOString().split('T')[0] : '';
  const dow    = state.date ? state.date.getDay() : 0;
  const dayTyp = (dow === 0 || dow === 5 || dow === 6) ? 'weekend' : 'weekday';
  const disc   = state.discount || { type: 'none', value: 0 };
  return {
    eventDate:      dt,
    dayType:        dayTyp,
    eventName:      isReserva ? (state.eventName || '') : (state.clientName || ''),
    eventDesc:      state.comments   || '',
    eventOthers:    state.notes      || '',
    startTime:      isReserva ? (state.startTime || '') : '',
    numKids:        String(state.kids    ?? 0),
    numAdults:      String(state.adults  ?? 0),
    extraHours:     String(state.extraHours || 0),
    kidsMenu:       state.kidsMenu   || 'basic',
    adultsMenu:     state.adultsMenu || 'pizza',
    eventAge:       state.edad       ? String(state.edad)  : '',
    eventSena:      state.sena       ? String(state.sena)  : '',
    senaConcepto:   state.senaConcepto  || 'Seña',
    senaFormaPago:  state.senaFormaPago || '',
    senaComentarios:'',
    romanRole:      state.roman      || '',
    discountType:   disc.type        || 'none',
    discValue:      String(disc.value || 0),
    precioFinalOverride: state.priceOverride ? String(state.priceOverride) : '',
    otroDesc:       '',
    otroValor:      '',
    _fromChatbot:   true,
    _isReserva:     isReserva,
  };
}

function openFormPrefilled(isReserva) {
  if (window.parent && window.parent !== window) {
    addMsg('bot', '📋 Abriendo el formulario con los datos...');
    setTimeout(() => {
      window.parent.postMessage({
        action: 'fillForm',
        form:   buildFormPayload(isReserva),
      }, '*');
    }, 400);
  } else {
    addMsg('bot', '⚠️ No se puede abrir el formulario desde esta ventana.');
  }
}

function processMessage(raw) {
  if (raw === '__reset__') { resetChat(); return; }

  // ── Ver en formulario (presupuesto o reserva) ─────────────
  if (raw === '__open_form_pres__') { openFormPrefilled(false); return; }
  if (raw === '__open_form_rsv__')  { openFormPrefilled(true);  return; }

  // ── Comando "form" → abre el formulario en la app padre ──
  if (/^\s*form\s*$/i.test(raw)) {
    addMsg('bot', '📋 Abriendo el formulario...');
    setTimeout(() => {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ action: 'openForm' }, '*');
      }
    }, 600);
    return;
  }

  const t = norm(raw);

  // ── Trigger reserva ───────────────────────────────────────
  if (/\breserva\b/.test(t) &&
      !['reserva_select','reserva_collecting','reserva_confirm',
        'reserva_editing_menu'].includes(state.step)) {
    startReservaFlow();
    return;
  }

  // ── Menú de filtro de reservas ────────────────────────────
  if (raw === '__reserva_nueva__') { startReservaFromScratch(); return; }
  if (raw === '__reserva_fromhoy__') {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    fetchAndShowPresupuestos(
      p => { const [d,m,y]=p.Fecha.split('/'); return new Date(+y,+m-1,+d)>=hoy; },
      'No hay presupuestos desde hoy. Podés crear una reserva desde cero.'
    );
    return;
  }
  if (raw === '__reserva_dia__') {
    botMsg('¿Para qué día? (Ej: sábado, 15/06, 15 de junio)');
    state._waitingFor = 'reserva_filter_dia'; return;
  }
  if (raw === '__reserva_mes__') {
    botMsg('¿Qué mes? (Ej: junio, julio, 6)');
    state._waitingFor = 'reserva_filter_mes'; return;
  }
  if (state._waitingFor === 'reserva_filter_dia') {
    state._waitingFor = null;
    const d = parseDateFromText(raw);
    if (!d) { botMsg('No entendí la fecha. Intentá con el formato DD/MM o "el sábado".'); return; }
    const ds = dateISO(d);
    fetchAndShowPresupuestos(
      p => { const [dd,mm,yy]=p.Fecha.split('/'); return `${yy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`===ds; },
      `No hay presupuestos para el ${fmtDate(d)}.`
    );
    return;
  }
  if (state._waitingFor === 'reserva_filter_mes') {
    state._waitingFor = null;
    const mn = t.match(/\b(\d{1,2})\b/) ? +t.match(/\b(\d{1,2})\b/)[1] : null;
    const monthNum = mn || MONTHS_ES[Object.keys(MONTHS_ES).find(k => t.includes(k))] || null;
    if (!monthNum) { botMsg('No entendí el mes. Escribí el nombre (ej: junio) o el número (ej: 6).'); return; }
    fetchAndShowPresupuestos(
      p => +p.Fecha.split('/')[1] === monthNum,
      `No hay presupuestos para ese mes.`
    );
    return;
  }

  // ── Selección de presupuesto ──────────────────────────────
  if (raw.startsWith('__pres__')) {
    selectPresupuesto(raw.replace('__pres__', ''));
    return;
  }
  if (raw === '__cancel_reserva__') {
    state.step = 'done';
    botMsg('Cancelado. ¿Qué más necesitás?', [
      { label: '🔄 Nuevo presupuesto', val: '__reset__' }
    ]);
    return;
  }

  // ── Edad/Roman/Seña en reserva_collecting ────────────────
  if (raw === '__skip_edad__') {
    state.edad = ''; state._waitingFor = null; handleReservaCollecting(); return;
  }
  if (state._waitingFor === 'edad_rsv') {
    const m = raw.replace(/\s/g,'').match(/\d+/);
    state.edad = m ? +m[0] : ''; state._waitingFor = null; handleReservaCollecting(); return;
  }
  if (raw.startsWith('__roman_')) {
    state.roman = raw.replace('__roman_', ''); state._waitingFor = null; handleReservaCollecting(); return;
  }
  if (raw === '__skip_sena__') {
    state.sena = 0; state.senaFormaPago = ''; state._waitingFor = null; handleReservaCollecting(); return;
  }
  if (state._waitingFor === 'sena_rsv') {
    const m = raw.replace(/[\s.$]/g,'').match(/\d+/);
    state.sena = m ? +m[0] : 0; state._waitingFor = null; handleReservaCollecting(); return;
  }
  // Forma de pago de la seña (quick reply __fp_XXXX__ o texto libre)
  if (raw.startsWith('__fp_')) {
    state.senaFormaPago = raw.replace(/^__fp_/, '').replace(/__$/, '');
    state._waitingFor = null; handleReservaCollecting(); return;
  }
  if (state._waitingFor === 'senaFormaPago_rsv' || state._waitingFor === 'edit_fp') {
    state.senaFormaPago = raw.trim(); state._waitingFor = null; handleReservaCollecting(); return;
  }

  // ── Esperando eventName o startTime ──────────────────────
  if (state._waitingFor === 'eventName') {
    state.eventName = raw.trim();
    state._waitingFor = null;
    handleReservaCollecting();
    return;
  }
  if (state._waitingFor === 'startTime') {
    const parsed = parseTime(raw);
    if (!parsed) {
      botMsg('No entendí la hora. Escribila así: 18:00 o "6 de la tarde"');
      return;
    }
    state.startTime = parsed;
    state._waitingFor = null;
    handleReservaCollecting();
    return;
  }

  // ── Estado: reserva_confirm ───────────────────────────────
  if (state.step === 'reserva_confirm') {
    if (raw === '__save_reserva__' || /^(guarda|confirma|dale|si|sí|listo|ok)/.test(t)) {
      const saved = saveReserva();
      state.step  = 'done';
      if (saved) botMsg('✅ ¡Reserva guardada!', [], 400);
      setTimeout(() => {
        botMsg('¿Necesitás algo más?', [
          { label: '🔄 Nuevo presupuesto', val: '__reset__' },
          { label: '📋 Otra reserva',      val: 'reserva'  },
          { label: '✅ No, gracias',        val: '__bye__'  },
        ]);
      }, 900);
      return;
    }
    if (raw === '__edit_reserva__' || /cambi|modific/.test(t)) {
      state.step = 'reserva_editing_menu';
      botMsg('¿Qué querés cambiar?', [
        { label: '🎉 Nombre evento',        val: '__re_eventname__'  },
        { label: '🕐 Hora inicio',           val: '__re_starttime__'  },
        { label: '📅 Fecha',                val: '__re_date__'       },
        { label: '🎂 Edad',                 val: '__re_edad__'       },
        { label: '🎭 Roman',                val: '__re_roman__'      },
        { label: '💵 Seña',                 val: '__re_sena__'       },
        { label: '💳 Forma de pago',        val: '__re_fp__'         },
        { label: '👶 Niños',                val: '__re_kids__'       },
        { label: '🧑 Adultos',              val: '__re_adults__'     },
        { label: '🍽️ Menú',                val: '__re_menu__'       },
        { label: '⏱ Horas extra',           val: '__re_hours__'      },
        { label: '💰 Precio final',          val: '__re_price__'      },
        { label: '🏷️ Descuento',             val: '__re_discount__'   },
        { label: '💬 Descripción',           val: '__re_desc__'       },
        { label: '📝 Nota',                 val: '__re_notes__'      },
      ]);
      return;
    }
    return;
  }

  // ── Estado: reserva_editing_menu (maneja cada campo) ─────
  if (state.step === 'reserva_editing_menu' && !state._waitingFor) {
    const editMap = {
      '__re_eventname__': ['eventName',      'Ingresá el nuevo nombre del evento:'],
      '__re_starttime__': ['edit_starttime', '¿Nueva hora de inicio? (Ej: 18:00)'],
      '__re_date__':      ['edit_date',      '¿Nueva fecha? (Ej: 15/06, el sábado)'],
      '__re_edad__':      ['edit_edad',      '¿Qué edad cumple?'],
      '__re_sena__':      ['edit_sena',      '¿Cuánto es la seña? ($0 si no hay)'],
      '__re_fp__':        ['edit_fp',        null],
      '__re_roman__':     ['edit_roman',     null],
      '__re_kids__':      ['edit_kids',      '¿Cuántos niños?'],
      '__re_adults__':    ['edit_adults',    '¿Cuántos adultos?'],
      '__re_menu__':      ['edit_menu',      null],
      '__re_hours__':     ['edit_hours',     '¿Cuántas horas extra?'],
      '__re_price__':     ['edit_price',     '¿Cuál es el precio final? (número sin puntos)'],
      '__re_discount__':  ['edit_discount',  '¿Tipo de descuento? Escribí "15%" o "$2000"'],
      '__re_desc__':      ['edit_desc',      '¿Cuál es la descripción?'],
      '__re_notes__':     ['edit_notes',     '¿Cuál es la nota interna?'],
    };
    if (editMap[raw]) {
      const [wf, prompt] = editMap[raw];
      if (wf === 'edit_menu') {
        state._waitingFor = 'edit_menu_reserva';
        botMsg('¿Con qué menú?', menuQuickReplies());
      } else if (wf === 'edit_roman') {
        state._waitingFor = 'edit_roman';
        botMsg('¿Roman en este evento?', [
          { label: '🎭 Recreador', val: '__roman_Recreador__' },
          { label: '🏛️ Salón',     val: '__roman_Salon__'    },
          { label: '❌ No va',      val: '__roman_No va__'    },
        ]);
      } else if (wf === 'edit_fp') {
        state._waitingFor = 'edit_fp';
        botMsg('¿Forma de pago de la seña?', [
          { label: '🏦 Banco Seba',    val: '__fp_Banco Seba__'    },
          { label: '🏦 Banco Vir',     val: '__fp_Banco Vir__'     },
          { label: '💵 Efectivo Fede', val: '__fp_Efectivo Fede__' },
        ]);
      } else {
        state._waitingFor = wf;
        botMsg(prompt);
      }
      return;
    }
    // Texto libre → intentar extraer y volver a confirmar
    extractFromText(raw);
    calculate();
    state.step = 'reserva_confirm';
    botMsg(buildReservaSummary(), [
      { label: '💾 Guardar reserva', val: '__save_reserva__' },
      { label: '✏️ Modificar',       val: '__edit_reserva__' },
    ]);
    return;
  }

  // ── Waiters para campos de reserva (editing) ──────────────
  if (state._waitingFor === 'eventName' || state._waitingFor === 'edit_eventname') {
    state.eventName = raw.trim(); state._waitingFor = null;
    state.step = 'reserva_collecting'; handleReservaCollecting(); return;
  }

  // ── Quick replies de extras ───────────────────────────────
  if (raw === '__no_extras__') { handleMissing(); return; }
  if (raw === '__want_hours__')   { botMsg('¿Cuántas horas extra?'); state._waitingFor = 'hours'; return; }
  if (raw === '__want_staff__')   { botMsg('¿Cuántas personas de personal adicional?'); state._waitingFor = 'staff'; return; }
  if (raw === '__want_comment__') { botMsg('¿Cuál es la descripción del evento?'); state._waitingFor = 'comment'; return; }
  if (raw === '__want_notes__')   { botMsg('¿Cuál es la nota interna?'); state._waitingFor = 'notes'; return; }

  // ── Esperando respuesta puntual ───────────────────────────
  const backToConfirm = isReserva => {
    calculate();
    if (isReserva) {
      state.step = 'reserva_confirm';
      botMsg(buildReservaSummary(), [
        { label: '💾 Guardar reserva', val: '__save_reserva__' },
        { label: '✏️ Modificar',       val: '__edit_reserva__' },
      ]);
    } else {
      showSummaryWithButtons();
    }
  };
  const isRsv = ['reserva_collecting','reserva_confirm','reserva_editing_menu'].includes(state.step);

  if (state._waitingFor === 'hours') {
    const m = t.match(/\d+/); if (m) state.extraHours = +m[0];
    state._waitingFor = null; handleMissing(); return;
  }
  if (state._waitingFor === 'staff') {
    const m = t.match(/\d+/); if (m) state.extraStaff = +m[0];
    state._waitingFor = null; handleMissing(); return;
  }
  if (state._waitingFor === 'comment') {
    state.comments = raw; state._waitingFor = null; handleMissing(); return;
  }
  if (state._waitingFor === 'notes') {
    state.notes = raw; state._waitingFor = null; handleMissing(); return;
  }
  // Campos de edición post-resumen
  if (state._waitingFor === 'edit_date') {
    const d = parseDateFromText(raw);
    if (!d) { botMsg('No entendí la fecha. Intentá con DD/MM o "el sábado".'); return; }
    state.date = d; state._dateWarningShown = false; state._waitingFor = null;
    if (isRsv) { state.step='reserva_collecting'; handleReservaCollecting(); }
    else { state.extrasAsked=true; backToConfirm(false); } return;
  }
  if (state._waitingFor === 'edit_kids') {
    const m = t.match(/\d+/); if (m) state.kids = +m[0];
    state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_adults') {
    const m = t.match(/\d+/); if (m) state.adults = +m[0];
    state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_menu' || state._waitingFor === 'edit_menu_reserva') {
    const wasReservaMenu = state._waitingFor === 'edit_menu_reserva';
    extractFromText(raw); state._waitingFor = null;
    backToConfirm(isRsv || wasReservaMenu); return;
  }
  if (state._waitingFor === 'edit_hours') {
    const m = t.match(/\d+/); if (m) state.extraHours = +m[0];
    state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_price') {
    const m = raw.replace(/\./g,'').match(/\d+/);
    if (m) { state.priceOverride = +m[0]; state.discount = { type:'none', value:0 }; }
    state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_discount') {
    const pct = raw.match(/(\d+(?:[.,]\d+)?)\s*%/);
    const fix = raw.replace(/\./g,'').match(/\$?\s*(\d+)/);
    if (pct) { state.discount = { type:'pct', value: parseFloat(pct[1]) }; state.priceOverride = null; }
    else if (fix) { state.discount = { type:'fixed', value: +fix[1] }; state.priceOverride = null; }
    state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_desc') {
    state.comments = raw; state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_notes') {
    state.notes = raw; state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_edad') {
    const m = raw.replace(/\s/g,'').match(/\d+/);
    state.edad = m ? +m[0] : ''; state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_sena') {
    const m = raw.replace(/[\s.$]/g,'').match(/\d+/);
    state.sena = m ? +m[0] : 0; state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_roman') {
    // Roman se maneja por __roman_X__ quick replies, pero por si escribe texto libre:
    if (/recreador/i.test(raw)) state.roman = 'Recreador';
    else if (/salon|salón/i.test(raw)) state.roman = 'Salon';
    else state.roman = 'No va';
    state._waitingFor = null; backToConfirm(isRsv); return;
  }
  if (state._waitingFor === 'edit_starttime') {
    const p = parseTime(raw);
    if (!p) { botMsg('No entendí la hora. Escribila así: 18:00 o "6 de la tarde"'); return; }
    state.startTime = p; state._waitingFor = null;
    state.step = 'reserva_collecting'; handleReservaCollecting(); return;
  }

  // ── Estado: confirm (presupuesto) ─────────────────────────
  if (state.step === 'confirm') {
    if (raw === '__save__' || /^(guarda|confirma|dale|si|sí|listo|ok)/.test(t)) {
      const saved = saveToSheet();
      const wapp  = buildWhatsApp();
      state.step  = 'done';
      if (saved) botMsg('✅ ¡Guardado en Google Sheets!', [], 300);
      setTimeout(() => showWappCard(wapp, saved), saved ? 900 : 300);
      setTimeout(() => {
        botMsg('¿Necesitás otro presupuesto?', [
          { label: '🔄 Sí, nuevo',   val: '__reset__' },
          { label: '✅ No, gracias', val: '__bye__'   },
        ]);
      }, saved ? 1500 : 900);
      return;
    }
    if (raw === '__edit__' || /cambi|modific|edit/.test(t)) {
      state.step = 'editing_menu';
      botMsg('¿Qué querés cambiar?', [
        { label: '📅 Fecha',               val: '__ed_date__'     },
        { label: '👶 Niños',               val: '__ed_kids__'     },
        { label: '🧑 Adultos',             val: '__ed_adults__'   },
        { label: '🍽️ Menú',               val: '__ed_menu__'     },
        { label: '⏱ Horas extra',          val: '__ed_hours__'    },
        { label: '👤 Personal adicional',   val: '__ed_staff__'    },
        { label: '💰 Precio final',         val: '__ed_price__'    },
        { label: '🏷️ Descuento',            val: '__ed_discount__' },
        { label: '💬 Descripción',          val: '__ed_desc__'     },
        { label: '📝 Nota',               val: '__ed_notes__'    },
      ]);
      return;
    }
    extractFromText(raw); calculate();
    botMsg(buildSummary(), [
      { label: '💾 Guardar', val: '__save__' },
      { label: '✏️ Modificar', val: '__edit__' },
    ]);
    return;
  }

  // ── Estado: editing_menu (presupuesto) ────────────────────
  if (state.step === 'editing_menu') {
    const edMap = {
      '__ed_date__':     ['edit_date',    '¿Nueva fecha?'],
      '__ed_kids__':     ['edit_kids',    '¿Cuántos niños?'],
      '__ed_adults__':   ['edit_adults',  '¿Cuántos adultos?'],
      '__ed_menu__':     ['edit_menu',    null],
      '__ed_hours__':    ['edit_hours',   '¿Cuántas horas extra?'],
      '__ed_staff__':    ['edit_staff',   '¿Cuántas personas de personal adicional?'],
      '__ed_price__':    ['edit_price',   '¿Cuál es el precio final?'],
      '__ed_discount__': ['edit_discount','¿Tipo de descuento? Escribí "15%" o "$2000"'],
      '__ed_desc__':     ['edit_desc',    '¿Cuál es la descripción?'],
      '__ed_notes__':    ['edit_notes',   '¿Cuál es la nota interna?'],
    };
    if (edMap[raw]) {
      const [wf, prompt] = edMap[raw];
      if (wf === 'edit_menu') {
        state._waitingFor = 'edit_menu';
        botMsg('¿Con qué menú?', menuQuickReplies());
      } else if (wf === 'edit_staff') {
        botMsg(prompt); state._waitingFor = 'staff';
      } else {
        state._waitingFor = wf; botMsg(prompt);
      }
      return;
    }
    // Texto libre
    extractFromText(raw); state.step = 'confirm'; backToConfirm(false); return;
  }

  // ── Estado: done ──────────────────────────────────────────
  if (state.step === 'done') {
    if (raw === '__bye__' || /^(no|gracias|listo|ok|chau)/.test(t)) {
      botMsg('¡Hasta pronto! 👋'); return;
    }
    resetState(); extractFromText(raw); handleMissing(); return;
  }

  // ── Estado normal (start): extraer y manejar ─────────────
  extractFromText(raw);
  handleMissing();
}

// ═══════════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════════
let _activeQR = null;  // referencia al último bloque de quick replies

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtBubble(s) {
  return escHtml(s)
    .replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}
function nowTime() {
  return new Date().toLocaleTimeString('es-UY', { hour:'2-digit', minute:'2-digit' });
}
function scrollDown() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function addUserBubble(text) {
  // Ocultar quick replies anteriores
  if (_activeQR) { _activeQR.remove(); _activeQR = null; }

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user';
  wrap.innerHTML =
    `<div class="bubble">${fmtBubble(text)}</div>` +
    `<div class="msg-time">${nowTime()}</div>`;
  document.getElementById('messages').appendChild(wrap);
  scrollDown();
}

function botMsg(text, quickReplies = [], delay = null) {
  const msgs = document.getElementById('messages');
  const typingDelay = delay !== null ? delay : Math.min(300 + text.length * 12, 1400);

  // Indicador "escribiendo…"
  const typing = document.createElement('div');
  typing.className = 'typing-row';
  typing.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(typing);
  scrollDown();

  setTimeout(() => {
    msgs.removeChild(typing);

    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap bot';
    wrap.innerHTML =
      `<div class="bubble">${fmtBubble(text)}</div>` +
      `<div class="msg-time">${nowTime()}</div>`;
    msgs.appendChild(wrap);

    if (quickReplies.length > 0) {
      const qrDiv = document.createElement('div');
      qrDiv.className = 'qr-row';
      quickReplies.forEach(qr => {
        const btn = document.createElement('button');
        btn.className = 'qr-btn';
        btn.textContent = qr.label;
        btn.onclick = () => {
          qrDiv.remove(); _activeQR = null;
          addUserBubble(qr.label);
          setTimeout(() => processMessage(qr.val), 80);
        };
        qrDiv.appendChild(btn);
      });
      msgs.appendChild(qrDiv);
      _activeQR = qrDiv;
    }
    scrollDown();
  }, typingDelay);
}

function showWappCard(text, savedToSheet) {
  const msgs = document.getElementById('messages');
  if (_activeQR) { _activeQR.remove(); _activeQR = null; }

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.padding = '6px';

  const label = document.createElement('div');
  label.style.cssText = 'font-size:.73rem;color:#555;padding:4px 6px 2px;font-weight:600';
  label.textContent = '📋 Listo para copiar:';

  const card = document.createElement('div');
  card.className = 'wapp-card';
  card.id = 'wapp-text-' + Date.now();
  card.textContent = text;

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = '📋 Copiar para WhatsApp';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(card.textContent).then(() => {
      copyBtn.textContent = '✅ ¡Copiado!';
      setTimeout(() => copyBtn.textContent = '📋 Copiar para WhatsApp', 2200);
    });
  };

  bubble.appendChild(label);
  bubble.appendChild(card);
  bubble.appendChild(copyBtn);

  if (savedToSheet) {
    const pill = document.createElement('div');
    pill.className = 'saved-pill';
    pill.textContent = '✅ Guardado en el sheet';
    bubble.appendChild(pill);
  }

  wrap.appendChild(bubble);
  wrap.innerHTML += `<div class="msg-time">${nowTime()}</div>`;
  wrap.insertBefore(bubble, wrap.lastChild);  // re-insert before time
  wrap.replaceChildren(bubble, wrap.lastChild);
  msgs.appendChild(wrap);
  scrollDown();
}

// ═══════════════════════════════════════════════════════════════
//  VOZ
// ═══════════════════════════════════════════════════════════════
let recognition = null, isListening = false;

function micReset() {
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('userInput').placeholder = 'Ej: 20 niños y 30 adultos para el sábado…';
}

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    botMsg('Tu navegador no soporta reconocimiento de voz.\n\nEn el celular podés usar el 🎤 del teclado para dictar directamente en el campo de texto.', [], 200);
    return;
  }

  // HTTPS requerido en mobile
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    botMsg('El micrófono requiere HTTPS. Usá el 🎤 del teclado de tu celular para dictar en el campo de texto 👆', [], 200);
    return;
  }

  if (isListening) { recognition.stop(); return; }

  recognition = new SR();
  // es-UY no siempre está disponible en mobile; caemos a es como fallback
  recognition.lang = 'es';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('userInput').placeholder = '🎤 Escuchando… tocá ⏹ para parar';
  };

  recognition.onresult = e => {
    micReset();
    const t = e.results[0][0].transcript;
    document.getElementById('userInput').value = t;
    sendMessage();
  };

  recognition.onerror = e => {
    micReset();
    const msgs = {
      'not-allowed':       'Permiso de micrófono denegado. Habilitalo en la configuración del navegador.',
      'no-speech':         'No se detectó voz. Intentá de nuevo.',
      'network':           'Error de red. Revisá tu conexión e intentá de nuevo.',
      'service-not-allowed': 'Servicio de voz no disponible en este navegador/protocolo.',
      'aborted':           null,   // cancelado por el usuario, no mostrar nada
    };
    const msg = msgs[e.error];
    if (msg) botMsg(msg, [], 100);
  };

  recognition.onend = () => { micReset(); };

  try {
    recognition.start();
  } catch(err) {
    micReset();
    botMsg('No se pudo iniciar el micrófono. Usá el 🎤 del teclado de tu celular para dictar.', [], 100);
  }
}

// ═══════════════════════════════════════════════════════════════
//  ENVIAR / RESET
// ═══════════════════════════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserBubble(text);
  setTimeout(() => processMessage(text), 80);
}

function resetChat() {
  resetState();
  document.getElementById('messages').innerHTML = '';
  _activeQR = null;
  greeting();
}

function greeting() {
  botMsg(
    '¡Hola! 👋 Soy el asistente del Salón.\n\nContame para cuántas personas y para qué fecha necesitás el presupuesto, y te calculo el total al toque.',
    [], 600
  );
}

// ── Init ─────────────────────────────────────────────────────
resetState();
initConfig().then(() => greeting());
</script>
